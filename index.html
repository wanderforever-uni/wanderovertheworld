<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>WANDER</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:sans-serif;
background:white;
}

/* tiêu đề */

.header{
width:100%;
height:120px;
display:flex;
justify-content:center;
align-items:center;
}

.title{
font-size:70px;
font-family:'Pacifico', cursive;
}

/* slideshow */

.slideshow{
position:relative;
width:100%;
height:70vh;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2s;
}

.slide.active{
opacity:1;
}

/* khoảng trống phía dưới */

.space{
height:300px;
background:white;
}

</style>

</head>

<body>

<div class="header">
<div class="title">Wander</div>
</div>

<div class="slideshow">

<img class="slide active" src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1745781230148-cd467af9ac58?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1620065487644-1080510335f5?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1621584728858-616080e4bd01?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1703825864792-5880081beaaf?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1528164344705-47542687000d?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1590850093323-ccc35c610511?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1610312278520-bcc893a3ff1d?w=3840&auto=format&fit=crop">

<img class="slide" src="https://images.unsplash.com/photo-1570742544137-3a469196c32b?w=3840&auto=format&fit=crop">

<!-- cá mập (crop ngang) -->
<img class="slide" src="https://images.unsplash.com/photo-1712901394300-2511501c4a8a?w=3840&auto=format&fit=crop">

</div>

<div class="space"></div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(function(){

slides[index].classList.remove("active");

index=(index+1)%slides.length;

slides[index].classList.add("active");

},5000);

</script>

</body>
</html>
