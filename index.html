<!DOCTYPE html>
<html>

<head>

<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
}

h1{
font-family:'Satisfy',cursive;
font-size:70px;
font-weight:normal;
margin-top:40px;
margin-bottom:40px;
}

img{
width:100%;
height:auto;
}

.bottom{
height:120px;
}

</style>

</head>

<body>

<h1>wander</h1>

<img id="slide">

<!-- youtube player ẩn -->
<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   SLIDESHOW ẢNH
========================= */

let images = [];
let current = 0;

/* random thứ tự */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

/* đổi ảnh */
function changeImage(){

document.getElementById("slide").src = images[current];

current = (current + 1) % images.length;

}

/* đọc file images.json */

fetch("images.json")
.then(response=>response.json())
.then(data=>{

shuffle(data);

images = data.slice(0,10);

changeImage();

setInterval(changeImage,5000);

});


/* =========================
   NHẠC NỀN YOUTUBE
========================= */

let musicList = [];
let currentTrack = 0;
let player;

/* lấy video ID */

function getVideoId(url){
let match = url.match(/v=([^&]+)/);
return match ? match[1] : null;
}

/* youtube api ready */

function onYouTubeIframeAPIReady(){

fetch("music.json")
.then(res=>res.json())
.then(data=>{

shuffle(data);

musicList = data;

let firstId = getVideoId(musicList[0]);

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:firstId,
events:{
'onReady':startMusic,
'onStateChange':onPlayerStateChange
}
});

});

}

/* bắt đầu phát */

function startMusic(){

player.mute();          // bắt buộc để autoplay
player.playVideo();     // chạy luôn

setTimeout(()=>{
player.unMute();        // bật lại âm thanh sau 1s
},1000);

}

/* khi nhạc kết thúc */

function onPlayerStateChange(event){

if(event.data === YT.PlayerState.ENDED){

setTimeout(()=>{

currentTrack = (currentTrack+1)%musicList.length;

let nextId = getVideoId(musicList[currentTrack]);

player.loadVideoById(nextId);

},10000);

}

}

/* fix autoplay */

document.body.addEventListener("click",()=>{
if(player){
player.playVideo();
}
},{once:true});

   window.addEventListener("load",()=>{

setTimeout(()=>{
if(player){
player.mute();
player.playVideo();
}
},2000);

});
   
</script>

</body>

</html>
