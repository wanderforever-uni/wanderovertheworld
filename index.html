<!DOCTYPE html>
<html>

<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
overflow:hidden;
}

/* title */
h1{
font-family:'Satisfy',cursive;
font-size:70px;
font-weight:normal;
margin-top:40px;
margin-bottom:40px;
}

/* image */
img{
width:100%;
height:auto;
}

/* overlay */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
cursor:pointer;
}

/* button */
#launchBtn{
width:220px;
height:220px;
border-radius:50%;
border:2px solid white;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
transition:0.4s;
}

#launchBtn:hover{
transform:scale(1.1);
}

/* rocket */
.rocket{
position:fixed;
bottom:-100px;
font-size:40px;
animation:fly 2s linear forwards;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.bottom{
height:120px;
}

</style>

</head>

<body>

<!-- overlay -->
<div id="overlay">
  <div id="launchBtn">launch to explore</div>
</div>

<h1>wander</h1>

<img id="slide">

<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ================= SLIDESHOW ================= */

let images = [];
let current = 0;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function changeImage(){
document.getElementById("slide").src = images[current];
current = (current + 1) % images.length;
}

fetch("images.json")
.then(res=>res.json())
.then(data=>{
shuffle(data);
images = data.slice(0,10);
changeImage();
setInterval(changeImage,5000);
});


/* ================= MUSIC ================= */

let musicList = [];
let currentTrack = 0;
let player = null;

function getVideoId(url){
let match = url.match(/v=([^&]+)/);
return match ? match[1] : null;
}

function onYouTubeIframeAPIReady(){

fetch("music.json")
.then(res=>res.json())
.then(data=>{

shuffle(data);
musicList = data;

let firstId = getVideoId(musicList[0]);

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:firstId,
playerVars:{
'autoplay':1,
'mute':1
},
events:{
'onStateChange':onPlayerStateChange
}
});

});

}

function startMusic(){
if(player){
player.mute();
player.playVideo();

setTimeout(()=>{
player.unMute();
},1000);
}
}

function onPlayerStateChange(event){
if(event.data === YT.PlayerState.ENDED){
setTimeout(()=>{
currentTrack = (currentTrack+1)%musicList.length;
let nextId = getVideoId(musicList[currentTrack]);
player.loadVideoById(nextId);
},10000);
}
}


/* ================= LAUNCH EFFECT ================= */

window.onload = function(){

const btn = document.getElementById("launchBtn");

btn.onclick = function(){

/* ẩn overlay */
document.getElementById("overlay").style.display = "none";

/* rocket effect */
for(let i=0;i<10;i++){

let rocket = document.createElement("div");
rocket.className = "rocket";
rocket.innerHTML = "🚀";

rocket.style.left = Math.random()*100 + "vw";
rocket.style.animationDuration = (1.5 + Math.random()*1.5) + "s";

document.body.appendChild(rocket);

setTimeout(()=>rocket.remove(),2000);
}

/* phát nhạc */
let wait = setInterval(()=>{
if(player){
startMusic();
clearInterval(wait);
}
},300);

};

};

</script>

</body>

</html>
