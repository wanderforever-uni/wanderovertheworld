<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>wander</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  text-align: center;
}

h1 {
  font-family: 'Satisfy', cursive;
  font-size: 70px;
  font-weight: normal;
  margin: 40px 0;
}

img {
  width: 100%;
  height: auto;
}

.bottom {
  height: 120px;
}
</style>
</head>

<body>

<h1>wander</h1>
<img id="slide">

<!-- youtube player ẩn -->
<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* =========================
   SLIDESHOW ẢNH
========================= */
let images = [];
let currentImage = 0;

function shuffle(array){
  for(let i=array.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function changeImage(){
  if(images.length > 0){
    document.getElementById("slide").src = images[currentImage];
    currentImage = (currentImage + 1) % images.length;
  }
}

fetch("images.json")
.then(res => res.json())
.then(data => {
  shuffle(data);
  images = data.slice(0, 10);
  changeImage();
  setInterval(changeImage, 5000);
});


/* =========================
   NHẠC NỀN YOUTUBE
========================= */
let musicList = [];
let currentTrack = 0;
let player;
let musicStarted = false; // kiểm soát click

function getVideoId(url){
  let match = url.match(/v=([^&]+)/);
  return match ? match[1] : null;
}

function onYouTubeIframeAPIReady(){
  fetch("music.json")
  .then(res => res.json())
  .then(data => {
    musicList = data;
    if(musicList.length === 0) return;
    let firstId = getVideoId(musicList[0]);
    player = new YT.Player('player', {
      height: '0',
      width: '0',
      videoId: firstId,
      events: {
        'onStateChange': onPlayerStateChange
      }
    });
  });
}

function onPlayerStateChange(event){
  if(event.data === YT.PlayerState.ENDED){
    setTimeout(() => {
      currentTrack = (currentTrack + 1) % musicList.length;
      let nextId = getVideoId(musicList[currentTrack]);
      player.loadVideoById(nextId);
    }, 10000);
  }
}

// Click lần đầu → bật nhạc
document.body.addEventListener("click", () => {
  if(player && !musicStarted){
    player.playVideo();
    musicStarted = true;
  }
}, {once:true});
</script>

</body>
</html>
