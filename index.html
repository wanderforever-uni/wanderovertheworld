<style>
body {
    margin: 0;
    text-align: center;
    background: #fff;
}

h1 {
    font-family: 'Satisfy', cursive;
    font-size: 70px;
    font-weight: normal;
    margin: 40px 0;
    color: #000;
}

img {
    width: 100%;
    height: auto;
    display: block;
}

.bottom {
    height: 30px;
}

/* --- TIME WRAPPER --- */
#time-wrapper {
    position: fixed;
    right: 20px;
    bottom: 120px;
    display: flex;
    gap: 10px;
    z-index: 9999;

    mix-blend-mode: exclusion; /* 🔥 đổi từ difference */
    pointer-events: none;
}

.time-box {
    font-family: 'Digital-7', monospace;
    text-align: center;
    line-height: 1.1;
    font-size: 18px;

    color: #fff;

    filter: contrast(1000%) grayscale(100%); 
    /* 🔥 ép về chỉ đen/trắng tuyệt đối */
}
    
.weekday {
    transform: rotate(90deg);
    display: inline-block;
    margin-top: 5px;
}

/* --- ROCKET --- */
#rocket-btn {
    position: fixed;
    right: 32px;
    bottom: 20px;
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    z-index: 10000;
}

/* --- AIR SECTION --- */
#air-section {
    position: relative;

    /* canh lề trái cố định */
    margin-left: 40px;

    /* cách time-wrapper 5px */
    margin-right: 65px; 
    /* 20px (right của time-wrapper) + ~40px width time + 5px gap */

    margin-top: 10px;
    margin-bottom: 60px;

    padding: 10px;
}

/* tiêu đề */
.air-title {
    font-family: 'Satisfy', cursive;
    font-size: 50px;
    text-align: center;
    margin-bottom: 30px;
    color: #000;
}

/* container 2 khung */
.air-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* mỗi khung */
.air-frame {
    min-height: 100px;
}

/* group bên trong khung 1 */
.air-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* item */
.air-item {
    text-align: center;
}

/* ô trên cùng */
.air-item.center {
    grid-column: 1 / span 2;
}

/* logo */
.logo-box {
    width: 100%;
    max-width: 250px;
    aspect-ratio: 1 / 1;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* text */
.air-name {
    font-size: 16px;
    font-weight: 500;
}

.air-country {
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<div id="time-wrapper">
    <div class="time-box" id="date-box"></div>
    <div class="time-box" id="clock-box"></div>
</div>

<div id="rocket-btn">🚀</div>

<script>
let images = [], current = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function changeImage() {
    if (images.length > 0) {
        document.getElementById("slide").src = images[current];
        current = (current + 1) % images.length;
    }
}

fetch("images.json")
    .then(r => r.json())
    .then(data => {
        shuffle(data);
        images = data.slice(0, 10);
        changeImage();
        setInterval(changeImage, 5000);
    });

const rocketBtn = document.getElementById("rocket-btn");
rocketBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n) { return n.toString().padStart(2, '0'); }

function updateTime() {
    const now = new Date();
    let year = now.getFullYear().toString();
    let yy1 = year.slice(0, 2), yy2 = year.slice(2);
    let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
    let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
    let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

    dateBox.innerHTML = `${yy1}<br>${yy2}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
    clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
}

setInterval(updateTime, 1000);
updateTime();
function getBrightness(r, g, b) {
    return (r * 299 + g * 587 + b * 114) / 1000;
}

function getBackgroundColorAtPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return [255,255,255];

    const style = getComputedStyle(el);
    const bg = style.backgroundColor;

    const match = bg.match(/\d+/g);
    if (match) return match.map(Number);

    return [255,255,255];
}

function updateTextColorByScroll() {
    const wrapper = document.getElementById("time-wrapper");
    const rect = wrapper.getBoundingClientRect();

    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    const [r,g,b] = getBackgroundColorAtPoint(x, y);
    const brightness = getBrightness(r,g,b);

    const color = brightness > 128 ? "#000" : "#fff";

    document.querySelectorAll(".time-box").forEach(el => {
        el.style.color = color;
    });
}

window.addEventListener("scroll", updateTextColorByScroll);
window.addEventListener("load", updateTextColorByScroll);
setInterval(updateTextColorByScroll, 500);

const rocket = document.getElementById("rocket-btn");
const timeWrapper = document.getElementById("time-wrapper");

function toggleUI() {
    const scrollY = window.scrollY;

    // chiều cao vùng slideshow (ảnh + bottom)
    const triggerHeight = document.getElementById("slide").offsetHeight;

    if (scrollY < triggerHeight) {
        // đang ở vùng ảnh
        rocket.style.opacity = "0";
        timeWrapper.style.opacity = "0";
    } else {
        // đã scroll xuống dưới
        rocket.style.opacity = "1";
        timeWrapper.style.opacity = "1";
    }
}

window.addEventListener("scroll", toggleUI);
window.addEventListener("load", toggleUI);

// --- VIDEO PLAYLIST ---
let videoList = [];  // danh sách video từ "videos.json"
let currentVideoIndex = 0;
const videoEl = document.getElementById("air-video");
const muteBtn = document.getElementById("mute-btn");
const playBtn = document.getElementById("play-btn");
const volumeBtn = document.getElementById("volume-btn");
const volumeSlider = document.getElementById("volume-slider");

let originalVideos = [];

fetch("planevideo.json")
    .then(r => r.json())
    .then(data => {
        originalVideos = data;
        videoList = shuffleArray(originalVideos); // ✅ shuffle toàn bộ video
        currentVideoIndex = 0;
        playNextVideo();
    });

// Phát video tiếp theo
function playNextVideo() {
    if (videoList.length === 0) return;

    videoEl.src = videoList[currentVideoIndex];
    videoEl.play();

    currentVideoIndex++;
    if (currentVideoIndex >= videoList.length) {
        // khi hết video, shuffle lại toàn bộ video cho lượt tiếp theo
        videoList = shuffleArray(originalVideos);
        currentVideoIndex = 0;
    }
}

// Hàm xáo trộn mảng
function shuffleArray(arr) {
    let copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

// Phát video tiếp theo
function playNextVideo() {
    if (videoList.length === 0) return;

    videoEl.src = videoList[currentVideoIndex];
    videoEl.play();

    currentVideoIndex++;
    if (currentVideoIndex >= videoList.length) {
        // khi hết 10 video, lấy 10 video ngẫu nhiên mới
        currentVideoIndex = 0;
        videoList = shuffleArray(originalVideos).slice(0, 10);
    }
}

// Khi video kết thúc -> phát tiếp
videoEl.addEventListener("ended", playNextVideo);

// --- NÚT ĐIỀU KHIỂN ---
// Ngôi sao 1: mute/unmute
let isMuted = true;
muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    videoEl.muted = isMuted;
    muteBtn.textContent = isMuted ? "⭐" : "🌟"; // ⭐ = muted, 🌟 = unmuted
});

// Ngôi sao 2: play/pause
let isPlaying = true;
playBtn.addEventListener("click", () => {
    if (videoEl.paused) {
        videoEl.play();
        isPlaying = true;
        playBtn.textContent = "⭐"; // ⭐ = play
    } else {
        videoEl.pause();
        isPlaying = false;
        playBtn.textContent = "🌟"; // 🌟 = pause
    }
});

// Ngôi sao 3: hiển thị/ẩn thanh volume
let volumeVisible = false;
volumeBtn.addEventListener("click", () => {
    volumeVisible = !volumeVisible;
    volumeSlider.style.display = volumeVisible ? "block" : "none";
});

// Volume slider
volumeSlider.addEventListener("input", () => {
    videoEl.volume = parseFloat(volumeSlider.value);
});

let airlineData = [];

// Load dữ liệu
fetch("airline.json")
    .then(r => r.json())
    .then(data => {
        airlineData = data;
        initRows();
    });

// Tạo 1 item logo
function createItem(air) {
    const div = document.createElement("div");
    div.className = "logo-item";

    const name = air.name || "Unknown";
    const country = air.country || "Unknown";
    const logo = air.logo || "https://via.placeholder.com/100?text=Logo";

    div.innerHTML = `
        <img src="${logo}" referrerpolicy="no-referrer"
             onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        <div class="logo-name">${name}</div>
        <div class="logo-country">${country}</div>
    `;
    return div;
}

// Shuffle mảng
function shuffleArray(arr) {
    let copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

// Kiểm tra 2 mảng giống nhau (theo tên)
function arraysEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
    }
    return true;
}

// Build row từ danh sách, trả về track element
function buildRowWithList(rowEl, list, direction) {
    rowEl.innerHTML = "";

    // Nhân đôi danh sách để chạy mượt
    let fullList = [...list, ...list];
    const track = document.createElement("div");
    track.className = "logo-track";

    fullList.forEach(i => track.appendChild(createItem(i)));
    rowEl.appendChild(track);

    const duration = 250; // tốc độ mặc định

    // Sử dụng direction được truyền vào
    track.style.animation = `${direction === "left" ? "scroll-left" : "scroll-right"} ${duration}s linear infinite`;

    // Khi animation kết thúc 1 vòng, shuffle lại
    track.addEventListener("animationend", () => {
        const newList = shuffleArray(list);
        buildRowWithList(rowEl, newList, direction);
    }, { once: true });
}

// Build 2 row không trùng thứ tự
function buildRowsNoRepeat(topEl, bottomEl) {
    let topList = shuffleArray(airlineData);
    let bottomList;

    do {
        bottomList = shuffleArray(airlineData);
    } while (arraysEqual(topList.map(a => a.name), bottomList.map(a => a.name)));

    // Gán hẳn chiều cố định cho từng row
    buildRowWithList(topEl, topList, "right");   // row trên: trái → phải
    buildRowWithList(bottomEl, bottomList, "left"); // row dưới: phải → trái
}

// Init rows
function initRows() {
    const top = document.getElementById("row-top");
    const bottom = document.getElementById("row-bottom");

    buildRowsNoRepeat(top, bottom);
}

function getOrdinal(n) {
    let s = ["th", "st", "nd", "rd"],
        v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
}


// --- PASSPORT SECTION ---
let passports = [];
let passportInfo = {};
let cycles = [];
let currentRound = 0;

// shuffle dùng chung cho tất cả
function shuffleArray(arr) {
    let copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

// lấy dữ liệu passport và info đồng thời
Promise.all([
    fetch("passport.json").then(r => r.json()),
    fetch("passportData.json").then(r => r.json())
]).then(([passportData, passportDetails]) => {
    passports = passportData;
    passportInfo = passportDetails;

    generateCycle();
    renderRound(); // ✅ lượt đầu hiển thị rank/visa
    setInterval(nextRound, 20000);
});

// tạo vòng lặp 10 ô
function generateCycle() {
    let shuffled = shuffleArray(passports);
    let m = Math.ceil(passports.length / 10);
    cycles = [];

    for (let i = 0; i < m; i++) {
        let slice = shuffled.slice(i * 10, (i + 1) * 10);

        if (slice.length < 10) {
            let extra = shuffleArray(passports).slice(0, 10 - slice.length);
            slice = slice.concat(extra);
        }

        cycles.push(slice);
    }

    currentRound = 0;
}

// hiển thị lượt hiện tại
function renderRound() {
    const row1 = document.getElementById("row-1");
    const row2 = document.getElementById("row-2");

    row1.innerHTML = "";
    row2.innerHTML = "";

    let list = cycles[currentRound] || [];

    list.forEach((p, i) => {
        let div = createPassportItem(p);
        fillInfo(p.name, div);

        if (i < 5) row1.appendChild(div);
        else row2.appendChild(div);
    });
}

// chuyển lượt tiếp theo
function nextRound() {
    currentRound++;
    if (currentRound >= cycles.length) generateCycle();
    renderRound();
}

// tạo 1 item passport
function createPassportItem(p) {
    const div = document.createElement("div");
    div.className = "passport-item";

    div.innerHTML = `
        <div class="img-box">
            <img src="${p.image}" alt="${p.name}">
        </div>
        <div class="p-name">${p.name}</div>
        <div class="p-rank">...</div>
        <div class="p-visa">...</div>
    `;
    return div;
}

// điền rank/visa
function fillInfo(name, el) {
    let info = passportInfo[name];
    if (!info) return;

    el.querySelector(".p-rank").textContent = info.rank;
    el.querySelector(".p-visa").textContent = info.visa;
}


</script>

</body>
</html>
