<!DOCTYPE html>
<html>
<head>
<title>wander</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    text-align:center;
    background:#fff;
}

h1 {
    font-family:'Satisfy',cursive;
    font-size:70px;
    font-weight:normal;
    margin:40px 0;
    color:#000;
}

img {
    width:100%;
    height:auto;
}

.bottom {
    height:120px;
}

/* --- BỘ NÚT CUỐN THEO MÀN HÌNH --- */
#control-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column; /* thứ tự DOM = thứ tự hiển thị */
    gap: 15px;
    z-index: 9999;
}

.control-btn {
    font-size:32px;
    cursor:pointer;
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative; /* để volume slider định vị tuyệt đối */
}

/* Volume slider dọc bên phải nút Cloud */
#volume-slider {
    writing-mode: bt-lr; /* dọc từ dưới lên */
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 80px;
    position: absolute;
    left: 40px; /* cách icon 40px sang phải */
    top: 50%;
    transform: translateY(-50%);
    display: none;
}
</style>
</head>
<body>

<h1>wander</h1>
<img id="slide">

<!-- youtube player ẩn -->
<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<!-- BỘ NÚT CUỐN THEO MÀN HÌNH -->
<div id="control-panel">
    <!-- Cloud Volume -->
    <div class="control-btn" id="volume-btn">☁️
        <input type="range" id="volume-slider" min="0" max="100" value="100">
    </div>
    <!-- Cloud Play/Pause -->
    <div class="control-btn" id="playpause-btn">☁️</div>
    <!-- Rocket -->
    <div class="control-btn" id="rocket-btn">🚀</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
// =========================
// SLIDESHOW ẢNH
// =========================
let images=[], current=0;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function changeImage(){
    if(images.length>0){
        document.getElementById("slide").src = images[current];
        current=(current+1)%images.length;
    }
}

fetch("images.json")
.then(r=>r.json())
.then(data=>{
    shuffle(data);
    images=data.slice(0,10);
    changeImage();
    setInterval(changeImage,5000);
});

// =========================
// NHẠC YOUTUBE
// =========================
let musicList=[], currentTrack=0, player;

function getVideoId(url){
    let m=url.match(/v=([^&]+)/);
    return m? m[1]:null;
}

function onYouTubeIframeAPIReady(){
    fetch("music.json")
    .then(r=>r.json())
    .then(data=>{
        shuffle(data);
        musicList=data;
        let firstId=getVideoId(musicList[0]);
        player=new YT.Player('player',{
            height:'0',
            width:'0',
            videoId:firstId,
            events:{
                'onReady':()=>player.playVideo(),
                'onStateChange':onPlayerStateChange
            }
        });
    });
}

function onPlayerStateChange(event){
    if(event.data===YT.PlayerState.ENDED){
        setTimeout(()=>{
            currentTrack=(currentTrack+1)%musicList.length;
            let nextId=getVideoId(musicList[currentTrack]);
            player.loadVideoById(nextId);
        },10000);
    }
}

// fix autoplay
document.body.addEventListener("click",()=>{
    if(player) player.playVideo();
},{once:true});

// =========================
// BỘ NÚT CUỐN THEO MÀN HÌNH
// =========================
let isPlaying=true;
const rocketBtn=document.getElementById("rocket-btn");
const playpauseBtn=document.getElementById("playpause-btn");
const volumeBtn=document.getElementById("volume-btn");
const volumeSlider=document.getElementById("volume-slider");

// Rocket scroll lên đầu trang
rocketBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:'smooth'}));

// Play/Pause nhạc
playpauseBtn.addEventListener("click",()=>{
    if(player && player.getPlayerState){
        if(isPlaying){player.pauseVideo(); isPlaying=false;}
        else{player.playVideo(); isPlaying=true;}
    }
});

// Hiện/ẩn volume slider
volumeBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    volumeSlider.style.display=(volumeSlider.style.display==='none')?'block':'none';
});

// Thay đổi volume
volumeSlider.addEventListener("input",()=>{
    if(player && player.setVolume) player.setVolume(volumeSlider.value);
});
</script>
</body>
</html>
