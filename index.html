<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; text-align:center; background:#fff; font-family:sans-serif; overflow-x: hidden; cursor: pointer; }
        h1 { font-family:'Satisfy', cursive; font-size:70px; margin:40px 0; color: #000; }
        
        /* Đảm bảo khung ảnh luôn hiển thị đúng */
        #slide { width: 100%; height: auto; display: block; min-height: 200px; }
        
        /* 1. ĐỒNG HỒ CASIO: ĐỔI MÀU THEO NỀN */
        #casioPanel { 
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%); 
            display: flex; gap: 20px; font-family: 'Share Tech Mono', monospace; 
            z-index: 999; mix-blend-mode: difference; color: #fff; 
        }
        .clock-box { display: flex; flex-direction: column; line-height: 1.1; font-size: 28px; }
        .day-vertical { font-size: 14px; writing-mode: vertical-rl; margin-top: 5px; text-transform: uppercase; }

        /* 2. BỘ NÚT: GIỮ MÀU GỐC (MÂY & TÊN LỬA) */
        #controlPanel { 
            position: fixed; right: 30px; bottom: 40px; 
            display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; 
            z-index: 1000; 
        }
        .btn { font-size: 32px; cursor: pointer; user-select: none; }
        .sub-menu { display: none; flex-direction: column; gap: 15px; margin-bottom: 10px; }
        .star-btn { position: relative; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .star-label { position: absolute; font-size: 10px; font-weight: bold; color: #000; pointer-events: none; }

        #volumeSlider { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 80px; display: none; margin-bottom: 10px; }
        #player { position: absolute; top: -9999px; }
    </style>
</head>
<body onclick="activateAudio()"> <h1>wander</h1>
    
    <img id="slide">
    
    <div id="player"></div>

    <div id="casioPanel">
        <div class="clock-box">
            <span id="hh">00</span><span id="mm">00</span><span id="ss" style="font-size:18px; opacity:0.8;">00</span>
        </div>
        <div class="clock-box">
            <span id="y1">20</span><span id="y2">26</span><span id="month">01</span><span id="day">01</span>
            <div id="weekday" class="day-vertical">MONDAY</div>
        </div>
    </div>

    <div id="controlPanel">
        <div class="btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">🚀</div>
        <div class="btn" onclick="togglePlay()">☁️</div>
        <div class="btn" onclick="toggleNav()">
            <div class="sub-menu" id="navSub">
                <div class="star-btn" onclick="nextTrack(event)">⭐<span class="star-label">n</span></div>
                <div class="star-btn" onclick="prevTrack(event)">⭐<span class="star-label">p</span></div>
            </div>
            <span>☁️</span>
        </div>
        <div class="btn" onclick="toggleVol()">
            <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVol(this.value)" onclick="event.stopPropagation()">
            <span>☁️</span>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let images = [], musicList = [], currentTrack = 0, currentImg = 0, player, playerReady = false;

        // Xáo trộn ngẫu nhiên
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        /* =========================
           SLIDESHOW LOGIC (FIXED)
        ========================= */
        function changeImage() {
            if (images.length === 0) return;
            document.getElementById("slide").src = images[currentImg];
            currentImg = (currentImg + 1) % images.length;
        }

        fetch("images.json")
            .then(res => res.json())
            .then(data => {
                shuffle(data);
                images = data.slice(0, 10); // Lấy 10 ảnh đầu tiên sau khi xáo trộn
                if (images.length > 0) {
                    changeImage(); // Hiện ảnh đầu tiên ngay lập tức
                    setInterval(changeImage, 5000); // Tự đổi ảnh sau mỗi 5 giây
                } else {
                    console.error("images.json is empty");
                }
            })
            .catch(err => console.error("Error loading images.json:", err));

        /* =========================
           YOUTUBE LOGIC
        ========================= */
        function getVideoId(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onYouTubeIframeAPIReady() {
            fetch("music.json").then(res => res.json()).then(data => {
                shuffle(data); musicList = data;
                if(musicList.length === 0) return;
                player = new YT.Player('player', {
                    height: '0', width: '0',
                    videoId: getVideoId(musicList[0]),
                    playerVars: { 'autoplay': 1, 'mute': 1, 'enablejsapi': 1 },
                    events: { 
                        'onReady': () => { playerReady = true; console.log("Player Ready"); },
                        'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextTrack(); }
                    }
                });
            }).catch(err => console.error("Error loading music.json:", err));
        }

        // KÍCH HOẠT NHẠC KHI CLICK BẤT KỲ ĐÂU (GIẢI PHÁP CHO RELOAD)
        function activateAudio() {
            if (playerReady && player) {
                player.unMute();
                player.playVideo();
                console.log("Audio On");
            }
        }

        // ĐIỀU KHIỂN NÚT
        function togglePlay() { if(playerReady) player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
        function toggleNav() { const s = document.getElementById("navSub"); s.style.display = (s.style.display === "flex") ? "none" : "flex"; }
        function nextTrack(e) { if(e) e.stopPropagation(); if(!playerReady) return; currentTrack = (currentTrack + 1) % musicList.length; player.loadVideoById(getVideoId(musicList[currentTrack])); player.unMute(); }
        function prevTrack(e) { if(e) e.stopPropagation(); if(!playerReady) return; currentTrack = (currentTrack - 1 + musicList.length) % musicList.length; player.loadVideoById(getVideoId(musicList[currentTrack])); player.unMute(); }
        function toggleVol() { const v = document.getElementById("volumeSlider"); v.style.display = (v.style.display === "block") ? "none" : "block"; }
        function setVol(val) { if(playerReady) player.setVolume(val); }

        /* =========================
           CASIO CLOCK LOGIC
        ========================= */
        function updateClock() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            document.getElementById("hh").innerText = pad(now.getHours());
            document.getElementById("mm").innerText = pad(now.getMinutes());
            document.getElementById("ss").innerText = pad(now.getSeconds());
            const y = String(now.getFullYear());
            document.getElementById("y1").innerText = y.slice(0,2);
            document.getElementById("y2").innerText = y.slice(2);
            document.getElementById("month").innerText = pad(now.getMonth()+1);
            document.getElementById("day").innerText = pad(now.getDate());
            const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
            document.getElementById("weekday").innerText = days[now.getDay()];
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
