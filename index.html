<!DOCTYPE html>
<html>

<head>

<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
}

h1{
font-family:'Satisfy',cursive;
font-size:70px;
font-weight:normal;
margin-top:40px;
margin-bottom:40px;
}

img{
width:100%;
height:auto;
}

.bottom{
height:120px;
}

</style>

</head>

<body>

<h1>wander</h1>

<img id="slide">

<!-- youtube player ẩn -->
<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   SLIDESHOW ẢNH
========================= */

let images = [];
let current = 0;

/* random thứ tự */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

/* đổi ảnh */
function changeImage(){

document.getElementById("slide").src = images[current];

current = (current + 1) % images.length;

}

/* đọc file images.json */

fetch("images.json")
.then(response=>response.json())
.then(data=>{

shuffle(data);

images = data.slice(0,10);

changeImage();

setInterval(changeImage,5000);

});


/* =========================
   NHẠC NỀN YOUTUBE
========================= */

let musicList = [];
let currentTrack = 0;
let player;

/* lấy video ID */

function getVideoId(url){
let match = url.match(/v=([^&]+)/);
return match ? match[1] : null;
}

/* youtube api ready */

function onYouTubeIframeAPIReady(){

fetch("music.json")
.then(res=>res.json())
.then(data=>{

shuffle(data);

musicList = data;

let firstId = getVideoId(musicList[0]);

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:firstId,
events:{
'onReady':startMusic,
'onStateChange':onPlayerStateChange
}
});

});

}

/* bắt đầu phát */

function startMusic(){
player.playVideo();
}

/* khi nhạc kết thúc */

function onPlayerStateChange(event){

if(event.data === YT.PlayerState.ENDED){

setTimeout(()=>{

currentTrack = (currentTrack+1)%musicList.length;

let nextId = getVideoId(musicList[currentTrack]);

player.loadVideoById(nextId);

},10000);

}

}

/* fix autoplay */

document.body.addEventListener("click",()=>{
if(player){
player.playVideo();
}
},{once:true});

</script>

<!-- =========================
     FULL FLOATING CONTROLS + DIGITAL CLOCK
========================= -->
<style>
#floatingControls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  gap: 10px;
  z-index: 9999;
  font-size: 28px;
  cursor: pointer;
}

.floatingBtn {
  user-select: none;
  background: transparent;
  border: none;
  font-size: 28px;
}

#volumeSlider {
  width: 100px;
  transform: rotate(-90deg);
  margin-bottom: 10px;
  display: none;
}

/* Digital clock */
.digitalBox {
  font-family: 'Digital-7', monospace;
  background: transparent;
  border: none;
  text-align: center;
  font-size: 24px;
  line-height: 1.1;
}
#weekday {
  display: block;
  transform: rotate(-90deg);
  font-size: 18px;
  margin-top: 2px;
}
</style>

<!-- Volume slider -->
<input type="range" id="volumeSlider" min="0" max="100" value="50">

<!-- Floating buttons -->
<div id="floatingControls">
  <button class="floatingBtn" id="rocketBtn">🚀</button>
  <button class="floatingBtn" id="cloudPause">☁️</button>
  <button class="floatingBtn" id="cloudVolume">☁️</button>
</div>

<!-- Clock and Date -->
<input id="timeBox" class="digitalBox" readonly>
<div id="dateBox" class="digitalBox">
  <span id="yy1"></span><br>
  <span id="yy2"></span><br>
  <span id="month"></span><br>
  <span id="day"></span><br>
  <span id="weekday"></span>
</div>

<script>
// ====== ROCKET ======
document.getElementById("rocketBtn").addEventListener("click", () => {
  window.scrollTo({top:0, behavior:'smooth'});
});

// ====== PAUSE/PLAY ======
let isPaused = false;
document.getElementById("cloudPause").addEventListener("click", () => {
  if(!player) return;
  if(isPaused){
    player.playVideo();
    isPaused = false;
  } else {
    player.pauseVideo();
    isPaused = true;
  }
});

// ====== VOLUME ======
const volumeBtn = document.getElementById("cloudVolume");
const volumeSlider = document.getElementById("volumeSlider");

volumeBtn.addEventListener("click", () => {
  volumeSlider.style.display = (volumeSlider.style.display==="none")?"block":"none";
});
volumeSlider.addEventListener("input", () => {
  if(player && typeof player.setVolume === "function"){
    player.setVolume(volumeSlider.value);
  }
});

// ====== DIGITAL CLOCK + DATE + WEEKDAY ======
const timeBox = document.getElementById("timeBox");
const yy1 = document.getElementById("yy1");
const yy2 = document.getElementById("yy2");
const month = document.getElementById("month");
const day = document.getElementById("day");
const weekdayBox = document.getElementById("weekday");

// Tự động đổi màu chữ theo nền
function getContrastColor(rgbColor){
    const match = rgbColor.match(/\d+/g);
    if(!match) return 'white';
    let r = parseInt(match[0]), g = parseInt(match[1]), b = parseInt(match[2]);
    let yiq = (r*299 + g*587 + b*114)/1000;
    return (yiq >= 128) ? 'black':'white';
}

function updateClock(){
    const now = new Date();
    // Time hh/mm/ss
    let hh = String(now.getHours()).padStart(2,'0');
    let mm = String(now.getMinutes()).padStart(2,'0');
    let ss = String(now.getSeconds()).padStart(2,'0');
    timeBox.value = `${hh}\n${mm}\n${ss}`;
    
    // Date yy1/yy2/mm/dd
    let year = String(now.getFullYear());
    yy1.textContent = year.slice(0,2);
    yy2.textContent = year.slice(2,4);
    month.textContent = String(now.getMonth()+1).padStart(2,'0');
    day.textContent = String(now.getDate()).padStart(2,'0');

    // Weekday
    weekdayBox.textContent = now.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase();

    // Cập nhật màu tương phản
    const bgColor = window.getComputedStyle(document.body).backgroundColor;
    const color = getContrastColor(bgColor);
    [timeBox, yy1, yy2, month, day, weekdayBox].forEach(el => el.style.color = color);
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>

</html>
