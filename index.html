<!DOCTYPE html>
<html>
<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

<style>
body {
    margin: 0;
    text-align: center;
    background: #fff;
}

h1 {
    font-family: 'Satisfy', cursive;
    font-size: 70px;
    font-weight: normal;
    margin: 40px 0;
    color: #000;
}

img {
    width: 100%;
    height: auto;
    display: block;
}

.bottom {
    height: 30px;
}

/* --- TIME WRAPPER --- */
#time-wrapper {
    position: fixed;
    right: 20px;
    bottom: 120px;
    display: flex;
    gap: 10px;
    z-index: 9999;

    mix-blend-mode: exclusion; /* 🔥 đổi từ difference */
    pointer-events: none;
}

.time-box {
    font-family: 'Digital-7', monospace;
    text-align: center;
    line-height: 1.1;
    font-size: 18px;

    color: #fff;

    filter: contrast(1000%) grayscale(100%); 
    /* 🔥 ép về chỉ đen/trắng tuyệt đối */
}
    
.weekday {
    transform: rotate(90deg);
    display: inline-block;
    margin-top: 5px;
}

/* --- ROCKET --- */
#rocket-btn {
    position: fixed;
    right: 32px;
    bottom: 20px;
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    z-index: 10000;
}

/* --- AIR SECTION --- */
#air-section {
    position: relative;

    /* canh lề trái cố định */
    margin-left: 40px;

    /* cách time-wrapper 5px */
    margin-right: 65px; 
    /* 20px (right của time-wrapper) + ~40px width time + 5px gap */

    margin-top: 10px;
    margin-bottom: 60px;

    padding: 10px;
}

/* tiêu đề */
.air-title {
    font-family: 'Satisfy', cursive;
    font-size: 50px;
    text-align: center;
    margin-bottom: 30px;
    color: #000;
}

/* container 2 khung */
.air-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* mỗi khung */
.air-frame {
    min-height: 100px;
}

/* group bên trong khung 1 */
.air-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* item */
.air-item {
    text-align: center;
}

/* ô trên cùng */
.air-item.center {
    grid-column: 1 / span 2;
}

/* logo */
.logo-box {
    width: 100%;
    max-width: 250px;
    aspect-ratio: 1 / 1;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* text */
.air-name {
    font-size: 16px;
    font-weight: 500;
}

.air-country {
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>wander</h1>
<img id="slide">

<div class="bottom"></div>

<div id="air-section">

    <h2 class="air-title">air</h2>

    <div class="air-container">

        <!-- KHUNG 1 -->
        <div class="air-frame">

            <div class="air-group">

                <!-- Ô 1 -->
                <div class="air-item center">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Qatar_Airways/Qatar_Airways-Logo.wine.svg">
                    </div>
                    <div class="air-name">Qatar Airways</div>
                    <div class="air-country">Qatar</div>
                </div>

                <!-- Ô 2 -->
                <div class="air-item">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Singapore_Airlines/Singapore_Airlines-Logo.wine.svg">
                    </div>
                    <div class="air-name">Singapore Airlines</div>
                    <div class="air-country">Singapore</div>
                </div>

                <!-- Ô 3 -->
                <div class="air-item">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Cathay_Pacific/Cathay_Pacific-Logo.wine.svg">
                    </div>
                    <div class="air-name">Cathay Pacific</div>
                    <div class="air-country">Hong Kong</div>
                </div>

            </div>

<!-- KHUNG 3 -->
<div id="air-extra">

    <!-- Hàng trên -->
    <div class="logo-row" id="row-top"></div>

    <!-- Hàng dưới -->
    <div class="logo-row" id="row-bottom"></div>

</div>
        </div>
  
       <!-- KHUNG 2 -->
<div class="air-frame">
    <!-- Video container -->
    <div id="video-container" style="width:720px; height:1280px; margin:0 auto; position: relative; border: none; left:-10px;">
        <video id="air-video" width="720" height="1280" autoplay muted playsinline></video>

        <!-- Star controls -->
        <div id="video-controls" style="display:flex; justify-content:center; gap:30px; margin-top:10px;">
            <span id="mute-btn" style="cursor:pointer; font-size:32px;">⭐</span>
            <span id="play-btn" style="cursor:pointer; font-size:32px;">⭐</span>
            <span id="volume-btn" style="cursor:pointer; font-size:32px;">⭐</span>
        </div>

        <!-- Volume slider -->
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" style="display:none; width:200px; margin:10px auto;">
    </div>
</div>


    </div>

</div>

<!-- KHUNG PASSPORT -->
<div id="passport-section" style="max-width: calc(100% - 80px); margin: 10px auto; padding: 10px;">
    <h2 class="passport-title">passport</h2>
    <!-- Nội dung bổ sung sau này sẽ nằm ở đây -->
    <div class="passport-content">
        <!-- ví dụ placeholder -->
        <p></p>
    </div>
</div>

<style>
/* --- Font và style cho passport --- */
.passport-title {
    font-family: 'Satisfy', cursive; /* giống air */
    font-size: 50px;
    text-align: center;
    margin-bottom: 30px;
    color: #000;
}

/* Container nội dung passport */
.passport-content {
    font-size: 16px;
    line-height: 1.5;
}

#passport-section {
    max-width: calc(100% - 80px);
    margin: 50px auto 10px; /* 50px trên, 10px dưới */
    padding: 10px;
}

/* KHUNG 3 */
#air-extra {
    width: 100%;
    margin-top: 30px;
}

/* mỗi hàng */
.logo-row {
    width: 100%;
    height: 140px;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
}

/* container chạy */
.logo-track {
    display: flex;
    position: absolute;
    gap: 0;
}

/* mỗi ô */
.logo-item {
    width: 100px;
    height: 100px;
    text-align: center;
    flex-shrink: 0;
}

/* logo */
.logo-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* text */
.logo-name {
    font-size: 12px;
}

.logo-country {
    font-size: 11px;
    opacity: 0.7;
}

/* animation */
@keyframes scroll-left {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

@keyframes scroll-right {
    from { transform: translateX(-50%); }
    to { transform: translateX(0); }
}
    
</style>
    
<div id="time-wrapper">
    <div class="time-box" id="date-box"></div>
    <div class="time-box" id="clock-box"></div>
</div>

<div id="rocket-btn">🚀</div>

<script>
let images = [], current = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function changeImage() {
    if (images.length > 0) {
        document.getElementById("slide").src = images[current];
        current = (current + 1) % images.length;
    }
}

fetch("images.json")
    .then(r => r.json())
    .then(data => {
        shuffle(data);
        images = data.slice(0, 10);
        changeImage();
        setInterval(changeImage, 5000);
    });

const rocketBtn = document.getElementById("rocket-btn");
rocketBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n) { return n.toString().padStart(2, '0'); }

function updateTime() {
    const now = new Date();
    let year = now.getFullYear().toString();
    let yy1 = year.slice(0, 2), yy2 = year.slice(2);
    let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
    let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
    let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

    dateBox.innerHTML = `${yy1}<br>${yy2}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
    clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
}

setInterval(updateTime, 1000);
updateTime();
function getBrightness(r, g, b) {
    return (r * 299 + g * 587 + b * 114) / 1000;
}

function getBackgroundColorAtPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return [255,255,255];

    const style = getComputedStyle(el);
    const bg = style.backgroundColor;

    const match = bg.match(/\d+/g);
    if (match) return match.map(Number);

    return [255,255,255];
}

function updateTextColorByScroll() {
    const wrapper = document.getElementById("time-wrapper");
    const rect = wrapper.getBoundingClientRect();

    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    const [r,g,b] = getBackgroundColorAtPoint(x, y);
    const brightness = getBrightness(r,g,b);

    const color = brightness > 128 ? "#000" : "#fff";

    document.querySelectorAll(".time-box").forEach(el => {
        el.style.color = color;
    });
}

window.addEventListener("scroll", updateTextColorByScroll);
window.addEventListener("load", updateTextColorByScroll);
setInterval(updateTextColorByScroll, 500);

const rocket = document.getElementById("rocket-btn");
const timeWrapper = document.getElementById("time-wrapper");

function toggleUI() {
    const scrollY = window.scrollY;

    // chiều cao vùng slideshow (ảnh + bottom)
    const triggerHeight = document.getElementById("slide").offsetHeight;

    if (scrollY < triggerHeight) {
        // đang ở vùng ảnh
        rocket.style.opacity = "0";
        timeWrapper.style.opacity = "0";
    } else {
        // đã scroll xuống dưới
        rocket.style.opacity = "1";
        timeWrapper.style.opacity = "1";
    }
}

window.addEventListener("scroll", toggleUI);
window.addEventListener("load", toggleUI);

// --- VIDEO PLAYLIST ---
let videoList = [];  // danh sách video từ "videos.json"
let currentVideoIndex = 0;
const videoEl = document.getElementById("air-video");
const muteBtn = document.getElementById("mute-btn");
const playBtn = document.getElementById("play-btn");
const volumeBtn = document.getElementById("volume-btn");
const volumeSlider = document.getElementById("volume-slider");

let originalVideos = [];

fetch("planevideo.json")
    .then(r => r.json())
    .then(data => {
        originalVideos = data;
        videoList = shuffleArray(originalVideos).slice(0, 10);
        playNextVideo();
    });

// Hàm xáo trộn mảng
function shuffleArray(arr) {
    let copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

// Phát video tiếp theo
function playNextVideo() {
    if (videoList.length === 0) return;

    videoEl.src = videoList[currentVideoIndex];
    videoEl.play();

    currentVideoIndex++;
    if (currentVideoIndex >= videoList.length) {
        // khi hết 10 video, lấy 10 video ngẫu nhiên mới
        currentVideoIndex = 0;
        videoList = shuffleArray(originalVideos).slice(0, 10);
    }
}

// Khi video kết thúc -> phát tiếp
videoEl.addEventListener("ended", playNextVideo);

// --- NÚT ĐIỀU KHIỂN ---
// Ngôi sao 1: mute/unmute
let isMuted = true;
muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    videoEl.muted = isMuted;
    muteBtn.textContent = isMuted ? "⭐" : "🌟"; // ⭐ = muted, 🌟 = unmuted
});

// Ngôi sao 2: play/pause
let isPlaying = true;
playBtn.addEventListener("click", () => {
    if (videoEl.paused) {
        videoEl.play();
        isPlaying = true;
        playBtn.textContent = "⭐"; // ⭐ = play
    } else {
        videoEl.pause();
        isPlaying = false;
        playBtn.textContent = "🌟"; // 🌟 = pause
    }
});

// Ngôi sao 3: hiển thị/ẩn thanh volume
let volumeVisible = false;
volumeBtn.addEventListener("click", () => {
    volumeVisible = !volumeVisible;
    volumeSlider.style.display = volumeVisible ? "block" : "none";
});

// Volume slider
volumeSlider.addEventListener("input", () => {
    videoEl.volume = parseFloat(volumeSlider.value);
});

let airlineData = [];

// load dữ liệu
fetch("airline.json")
    .then(r => r.json())
    .then(data => {
        airlineData = data;
        initRows();
    });

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// tạo 1 item
function createItem(air) {
    const div = document.createElement("div");
    div.className = "logo-item";

    div.innerHTML = `
        <img src="${air.logo}" referrerpolicy="no-referrer"
             onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        <div class="logo-name">${air.name}</div>
        <div class="logo-country">${air.country}</div>
    `;

    return div;
}

// lấy 4 item (không lặp quá 2 lần)
function pickItems(exclude = []) {
    let pool = shuffle([...airlineData]);

    let result = [];

    for (let item of pool) {
        if (result.filter(x => x.name === item.name).length < 2) {
            result.push(item);
        }
        if (result.length === 4) break;
    }

    return result;
}

// tạo row
function buildRow(rowEl, direction, avoidList = []) {
    const track = document.createElement("div");
    track.className = "logo-track";

    let items = pickItems();

    // hạn chế trùng giữa 2 hàng (<=25%)
    if (avoidList.length) {
        items = items.map(i => {
            if (avoidList.includes(i.name) && Math.random() > 0.25) {
                return shuffle(airlineData)[0];
            }
            return i;
        });
    }

    // nhân đôi để chạy mượt
    let fullList = [...items, ...items];

    fullList.forEach(i => track.appendChild(createItem(i)));

    rowEl.innerHTML = "";
    rowEl.appendChild(track);

    // animation
    track.style.animation =
        direction === "left"
            ? "scroll-left 20s linear infinite"
            : "scroll-right 20s linear infinite";

    return items.map(i => i.name);
}

// init
function initRows() {
    const top = document.getElementById("row-top");
    const bottom = document.getElementById("row-bottom");

    let topList = buildRow(top, "left");
    buildRow(bottom, "right", topList);

    // refresh mỗi 20s (đồng bộ animation)
    setInterval(() => {
        let topList = buildRow(top, "left");
        buildRow(bottom, "right", topList);
    }, 20000);
}
    
</script>

</body>
</html>
