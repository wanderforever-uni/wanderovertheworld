<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; text-align:center; background:#fff; font-family:sans-serif; }
        h1 { font-family:'Satisfy', cursive; font-size:70px; margin:40px 0; color: #000; }
        img { width:100%; height:auto; display:block; }
        
        /* 1. CHỈ ĐỒNG HỒ MỚI ĐỔI MÀU THEO NỀN */
        #casioPanel { 
            position:fixed; left:30px; top:50%; transform:translateY(-50%); 
            display:flex; gap:20px; font-family:'Share Tech Mono', monospace; 
            z-index: 9999;
            mix-blend-mode: difference; /* Hiệu ứng đổi màu chỉ ở đây */
            color: #fff;
        }
        .clock-box { display:flex; flex-direction:column; line-height:1.1; font-size:28px; }
        .day-vertical { font-size:14px; writing-mode:vertical-rl; margin-top:5px; text-transform: uppercase; }

        /* 2. BỘ NÚT ĐIỀU KHIỂN: GIỮ MÀU GỐC, KHÔNG ĐỔI MÀU */
        #controlPanel { 
            position:fixed; right:30px; bottom:40px; 
            display:flex; flex-direction:column-reverse; align-items:center; gap:15px; 
            z-index: 9999;
            /* KHÔNG có mix-blend-mode ở đây */
        }
        .btn { font-size:32px; cursor:pointer; transition:0.3s; user-select:none; position: relative; }
        
        .sub-menu { display:none; flex-direction:column; gap:15px; margin-bottom: 10px; }
        .star-btn { position: relative; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        
        /* Chữ n/p trong ngôi sao - Giữ màu đen để dễ nhìn trên nền sao vàng */
        .star-label { 
            position: absolute; font-size: 10px; font-family: 'Share Tech Mono', monospace; 
            font-weight: bold; margin-top: 2px; pointer-events: none; color: #000; 
        }

        #volumeSlider { 
            writing-mode: bt-lr; appearance: slider-vertical; 
            width:8px; height:80px; display:none; margin-bottom: 10px; 
        }

        #player { position: absolute; top: -9999px; left: -9999px; }

        /* Lớp phủ tàng hình bắt tương tác đầu tiên sau khi Reload */
        #interactionOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10001; background: rgba(0,0,0,0);
        }
    </style>
</head>
<body>

    <div id="interactionOverlay"></div>

    <h1>wander</h1>
    <img id="slide">
    <div id="player"></div>

    <div id="casioPanel">
        <div class="clock-box">
            <span id="hh">00</span><span id="mm">00</span><span id="ss" style="font-size:18px; opacity:0.8;">00</span>
        </div>
        <div class="clock-box">
            <span id="y1">20</span><span id="y2">26</span><span id="month">01</span><span id="day">01</span>
            <div id="weekday" class="day-vertical">MONDAY</div>
        </div>
    </div>

    <div id="controlPanel">
        <div class="btn" id="rocketBtn" title="Back to Top">🚀</div>
        <div class="btn" id="playPauseBtn" title="Play/Pause">☁️</div>
        <div class="btn" id="navBtn">
            <div class="sub-menu" id="navSub">
                <div class="star-btn" id="nextBtn">⭐<span class="star-label">n</span></div>
                <div class="star-btn" id="prevBtn">⭐<span class="star-label">p</span></div>
            </div>
            <span>☁️</span>
        </div>
        <div class="btn" id="volBtn">
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
            <span>☁️</span>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let musicList = [], currentTrack = 0, player, playerReady = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function getVideoId(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onYouTubeIframeAPIReady() {
            fetch("music.json")
            .then(res => res.json())
            .then(data => {
                shuffle(data);
                musicList = data;
                player = new YT.Player('player', {
                    height: '0', width: '0',
                    videoId: getVideoId(musicList[0]),
                    playerVars: { 'autoplay': 1, 'mute': 1, 'enablejsapi': 1 },
                    events: {
                        'onReady': (e) => { playerReady = true; e.target.playVideo(); },
                        'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextTrack(); }
                    }
                });
            });
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % musicList.length;
            player.loadVideoById(getVideoId(musicList[currentTrack]));
            player.unMute();
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + musicList.length) % musicList.length;
            player.loadVideoById(getVideoId(musicList[currentTrack]));
            player.unMute();
        }

        // KÍCH HOẠT NHẠC KHI CLICK BẤT KỲ ĐÂU (GIẢI PHÁP CHO RELOAD)
        document.getElementById("interactionOverlay").onclick = function() {
            if (playerReady && player) {
                player.unMute();
                player.playVideo();
                this.style.display = "none"; 
                console.log("Music Started after Interaction");
            }
        };

        // BUTTONS LOGIC
        document.getElementById("rocketBtn").onclick = (e) => {
            e.stopPropagation();
            window.scrollTo({top:0, behavior:'smooth'});
        };
        
        document.getElementById("playPauseBtn").onclick = (e) => {
            e.stopPropagation();
            if(!playerReady) return;
            player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
        };

        document.getElementById("navBtn").onclick = (e) => {
            e.stopPropagation();
            const s = document.getElementById("navSub");
            s.style.display = s.style.display === "flex" ? "none" : "flex";
        };

        document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); nextTrack(); };
        document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); prevTrack(); };

        document.getElementById("volBtn").onclick = (e) => {
            e.stopPropagation();
            const v = document.getElementById("volumeSlider");
            v.style.display = v.style.display === "block" ? "none" : "block";
        };

        document.getElementById("volumeSlider").oninput = function(e) {
            e.stopPropagation();
            if(playerReady) player.setVolume(this.value);
        };

        // CASIO CLOCK LOGIC
        function updateClock() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            document.getElementById("hh").innerText = pad(now.getHours());
            document.getElementById("mm").innerText = pad(now.getMinutes());
            document.getElementById("ss").innerText = pad(now.getSeconds());
            const y = String(now.getFullYear());
            document.getElementById("y1").innerText = y.slice(0,2);
            document.getElementById("y2").innerText = y.slice(2);
            document.getElementById("month").innerText = pad(now.getMonth()+1);
            document.getElementById("day").innerText = pad(now.getDate());
            const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
            document.getElementById("weekday").innerText = days[now.getDay()];
        }
        setInterval(updateClock, 1000); updateClock();
