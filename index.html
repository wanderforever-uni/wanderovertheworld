<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>

    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

    <style>
        /* --- 1. GENERAL STYLES --- */
        @font-face {
            font-family: 'Modelista';
            src: url('font/Modelistasignature-ownAV.otf') format('opentype');
            font-display: swap;
        }

        body {
            margin: 0;
            text-align: center;
            background: #fff;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            /* 70px trên màn hình 3840px tương đương khoảng 1.82vw */
            /* Công thức: (70 / 3840) * 100 = 1.8229 */
            font-size: 5.21vw; 
    
            font-weight: normal;
    
            /* Margin 40px tương đương khoảng 1.04vw */
            margin: 1.04vw 0; 
    
            color: #000;
            text-align: center;
            width: 100%;
            display: block;
        }

        img {
            width: 100%;
            height: auto;       
            aspect-ratio: 16 / 9;  
            object-fit: cover;  
            display: block;

            image-rendering: -webkit-optimize-contrast; /* Hỗ trợ trình duyệt Chrome/Safari */
            image-rendering: high-quality;
        }

        .bottom {
            height: 0.78vw; /* ~30px/3840px */
        }

        /* --- 2. UI ELEMENTS (Clock & Rocket) --- */
        #time-wrapper {
            position: fixed;
            right: 0.52vw;   /* Tương ứng 20px */
            bottom: 4.17vw; /* Tương ứng 160px */
            display: flex;
            gap: 0.52vw;     /* Tương ứng 20px */
            z-index: 9999;
            mix-blend-mode: exclusion;
            pointer-events: none;
        }

        .time-box {
            font-family: 'Digital-7', monospace;
            text-align: center;
            line-height: 1.1;
            font-size: 0.94vw; /* Tương ứng 36px */
            color: #fff;
            filter: contrast(1000%) grayscale(100%);
        }

        .weekday {
            transform: rotate(90deg);
            display: inline-block;
            margin-top: 0.26vw; /* Khoảng cách lề chữ Thứ linh hoạt */
        }

        #rocket-btn {
            position: fixed;
            right: 0.83vw;   /* Tương ứng 32px */
            bottom: 0.52vw;  /* Tương ứng 20px */
            font-size: 1.67vw; /* Tương ứng 64px */
            cursor: pointer;
            user-select: none;
            z-index: 10000;
            transition: transform 0.3s ease; /* Thêm hiệu ứng mượt khi di chuột vào */
        }
        /* Thêm hiệu ứng phóng nhẹ khi di chuột để tăng tính tương tác */
        #rocket-btn:hover {
            transform: scale(1.2);
        }

        /* --- 3. AIR SECTION --- */
        #air-section {
            position: relative;
            /* 1. Thiết lập lề trái và phải bằng nhau để khung LUÔN CĂN GIỮ */
            /* Con số 2.76vw đảm bảo cạnh phải cách Tên lửa đúng 10px trên màn 4K */
            margin-left: 3.8vw;   
            margin-right: 3.8vw;
            margin-top: 0.26vw;    /* ~10px */
            margin-bottom: 1.56vw; /* ~60px */
            padding: 0.26vw;       /* ~10px */
            width: auto;           /* Tự động tính chiều ngang dựa trên margin */
            height: auto;          /* QUAN TRỌNG: Khung sẽ cao bằng nội dung bên trong */
    
            /* Đảm bảo nội dung bên trong (float/absolute nếu có) không làm vỡ khung */
            overflow: hidden;      
            display: block;
        }

        .air-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw;    /* Kích thước chữ "air" 50px */
            text-align: center;  /* Luôn căn giữa trong khung đã được căn giữa */
            width: 100%;
            display: block;
            margin-bottom: 1.5vw; /* Kích thước 30px */
            color: #000;
        }

        .air-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 1.5vw;
            align-items: stretch;          /* Chiều cao 2 bên luôn bằng nhau */
            width: 100%;
            box-sizing: border-box; /* Đảm bảo tính toán kích thước chính xác */
        }

        /* Khung Trái chứa các bộ Logo */
        .air-frame-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            width: 100%;
            margin-top: 0;
        }

        /* Thay đổi các thông số margin cũ của bạn */
        .air-row-top { 
            display: flex; 
            justify-content: center; 
            width: 100%; 
            margin-bottom: 2vw;   /* Giảm xuống từ 2vw */
         }

         .air-row-middle { 
             display: flex; 
             justify-content: center; 
             gap: 4vw;             /* Giảm xuống từ 3vw */
             width: 100%; 
             margin-bottom: 4vw; /* Giảm xuống từ 4vw */
         }

        /* Ô lớn 345x345 */
        .logo-box-large {
            width: 11vw;  /* ~422px trên 4K */
            height: 11vw;
            margin: 0 auto 0.8vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ô nhỏ 160x160 cho Running Logos */
        .logo-box-small {
            width: 4.2vw; /* ~160px trên 4K */
            height: 4.2vw;
            margin: 0 auto 0.3vw;
            display: flex; align-items: center; 
            justify-content: center;
        }
        #video-controls {
            display: flex; 
            justify-content: center; 
            gap: 1.2vw;        /* Khoảng cách linh hoạt */
            margin-top: 0.52vw; 
            width: 100%;
        }

        #video-controls span {
            cursor: pointer; 
            font-size: 1.56vw;   /* Kích thước ngôi sao linh hoạt theo màn hình */
            user-select: none;
        }
        
        #video-controls span:hover {
            transform: scale(1.2);
        }

        #volume-slider {
            display: none; 
            width: 6vw;      /* Thanh trượt linh hoạt */
            margin: 0.4vw auto;
        }
        
        .logo-box-large img, .logo-box-small img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        .air-item { text-align: center; }
        .air-name { 
            font-size: 1vw;     /* Chuyển sang vw để đồng bộ màn hình 4K */
            font-weight: bold; 
            line-height: 1.2; 
            min-height: 2.4vw;    /* Dùng min-height thay vì height */
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            overflow: visible;
        }
        .air-country { 
            font-size: 0.7vw; 
            opacity: 0.7; 
            line-height: 1.2; 
            min-height: 1.7vw; 
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            overflow: visible;
        }

        /* Video 720x1280 */
        #video-container {
            width: 100%;          /* Để nó chiếm hết 0.8fr của cột phải */
            max-width: none;      /* Giới hạn độ rộng vừa phải */
            max-height: none;
            aspect-ratio: 720 / 1280;
            margin: 0 auto;
            background: transparent;
            position: relative;
            overflow: visible;
            display: flex;
            flex-direction: column;
        }

        #air-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Running Logos (Khung 3) - CHUẨN KÍCH THƯỚC 200x200 --- */
        #air-extra { 
            width: 100%; 
            margin-top: 0.78vw; /* ~30px */
        }

        .logo-row {
            width: 100%;
            /* Tăng chiều cao lên để chứa đủ ô 200px và 2 dòng chữ bên dưới */
            height: 9.2vw;      /* Khoảng 280px trên màn 4K để không bị cấn chữ */
            margin: 0.7vw auto; 
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .logo-track {
            display: flex;
            position: absolute;
            flex-wrap: nowrap;
            gap: 0.52vw;        /* Khoảng cách 20px giữa các logo */
        }

        .logo-item { 
            width: 5.0vw; /* ~160px trên 4K */
            height: 5.0vw;
            margin: 0 auto 0.3vw;
            text-align: center; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .logo-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            image-rendering: high-quality;  /* Ưu tiên chất lượng hiển thị */
            margin-bottom: 0.4vw;
        }

        .logo-name { 
            font-size: 0.45vw;  /* Khoảng 16px trên màn 4K */
            font-weight: bold;  /* THÊM DÒNG NÀY ĐỂ IN ĐẬM */
            margin-top: 0.26vw; /* Khoảng cách với logo ~10px */
            color: #000;        /* Đảm bảo màu đen rõ nét */
            text-align: center;
            width: 100%;
            line-height: 1.4;
            height: 1.4vw; 
    
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: visible; /* Thay vì hidden, hãy dùng visible để kiểm tra, sau đó đổi lại hidden khi đã chuẩn */
            margin-top: 0.4vw;
        }

        .logo-country { 
            font-size: 0.42vw;
            font-weight: 500;
            opacity: 0.9;
            text-align: center;
            width: 100%;
            line-height: 1.4;
            height: 1.3vw;
            display: flex;
            align-items: flex-start;
            justify-content: center;
    
            overflow: visible;
            margin-top: 0.1vw;
        }

        @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes scroll-right { from { transform: translateX(-50%); } to { transform: translateX(0); } }

        /* --- 4. PASSPORT SECTION --- */
        #passport-section {
            position: relative;
            margin-left: 3.8vw;   /* Đồng bộ với Air */
            margin-right: 3.8vw;
            margin-top: 5vw;      /* Khoảng cách giữa 2 section lớn */
            margin-bottom: 5vw;
            padding: 0.26vw;
            width: auto;
            overflow: hidden;
            display: block;
        }

        .passport-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw;    /* Bằng kích thước chữ "air" */
            text-align: center;
            width: 100%;
            display: block;
            margin-bottom: 1.5vw;
            color: #000;
        }

        .passport-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; /* Tỉ lệ y hệt khung Air */
            gap: 1.5vw;
            align-items: stretch; /* Chiều cao 2 bên bằng nhau */
            width: 100%;
            box-sizing: border-box;
        }

        /* Khung Trái Passport */
        .passport-frame-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
        }

        .passport-main-image-box {
            width: 100%; /* Chiếm hết chiều ngang khung trái (~ khung trái Air) */
            aspect-ratio: 1040 / 1477; /* Tỉ lệ chuẩn của passport */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2vw;
        }

        .passport-main-image-box img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .passport-info-rows {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8vw; /* Khoảng cách giữa các dòng */
        }

        .pass-row-name {
            font-size: 1.8vw;
            font-weight: bold;
            text-align: center;
            min-height: 4.5vw; /* Phòng hờ 2 dòng nếu tên quá dài */
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pass-row-rank {
            font-size: 1.4vw;
            text-align: center;
            color: #333;
        }

        .pass-row-visa {
            display: flex;
            justify-content: space-between;
            font-size: 1.1vw;
            font-weight: 500;
            padding: 0 1vw;
        }

        /* Khung Phải Passport */
        .passport-frame-right {
            display: flex;
            flex-direction: column;
            width: 100%;
        }    

        #passport-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5vw; /* Khoảng cách giữa 2 hàng passport */
        }

        .passport-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 ô đều nhau */
            gap: 0.8vw;
            width: 100%;
        }

        .passport-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* Khung ô vuông */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.4vw;
        }

        .img-box img {
            height: 100%; /* Lấy chiều dọc làm tiêu chuẩn như bạn yêu cầu */
            max-width: 100%;
            object-fit: contain;
        }

        /* Text trong khung nhỏ */
        .p-name { 
            font-size: 0.65vw; 
            font-weight: bold; 
            min-height: 1.6vw; /* Phòng hờ nhảy dòng */
            line-height: 1.2;
            margin-bottom: 0.2vw;
        }
        .p-rank, .p-visa { font-size: 0.55vw; opacity: 0.8; }

        /* Khung tìm kiếm (Search Section) */
        .passport-search-area {
            margin-top: 2vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vw;
        }

        .passport-row-lower {
            display: flex;
            justify-content: space-around;
            gap: 2vw;
        }

        .lower-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lower-img {
            height: 4vw; /* Bằng khoảng 1/2 ô nhỏ ở trên */
            aspect-ratio: 1040 / 1477;
            margin-bottom: 0.5vw;
        }

        .lower-img img { height: 100%; object-fit: contain; }

        .lower-search {
            margin-top: 0.5vw;
            width: 100%;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.3vw;
            font-size: 0.7vw;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        /* Con số 199 cuối cùng */
        .passport-total {
            margin-top: 2vw;
            font-family: 'Modelista', cursive;
            font-size: 8vw; /* Rất lớn và nổi bật */
            text-align: center;
            color: #2D1B33; /* Tím đen */
        }
    </style>
</head>

<body>

    <h1>wander</h1>
    <img id="slide">
    <div class="bottom"></div>

    <div id="air-section">
        <h2 class="air-title">air</h2>
        <div class="air-container">
            <div class="air-frame-left">
                <div class="air-row-top">
                    <div class="air-item">
                        <div class="logo-box-large"><img src="https://www.logo.wine/a/logo/Qatar_Airways/Qatar_Airways-Logo.wine.svg"></div>
                        <div class="air-name">Qatar Airways</div>
                        <div class="air-country">Qatar</div>
                    </div>
                </div>
                <div class="air-row-middle">
                    <div class="air-item">
                        <div class="logo-box-large"><img src="https://www.logo.wine/a/logo/Singapore_Airlines/Singapore_Airlines-Logo.wine.svg"></div>
                        <div class="air-name">Singapore Airlines</div>
                        <div class="air-country">Singapore</div>
                    </div>
                    <div class="air-item">
                        <div class="logo-box-large"><img src="https://www.logo.wine/a/logo/Cathay_Pacific/Cathay_Pacific-Logo.wine.svg"></div>
                        <div class="air-name">Cathay Pacific</div>
                        <div class="air-country">Hong Kong</div>
                    </div>
                </div>

                    <div class="logo-row" id="row-top"></div>

                <div id="video-container">

    <div id="passport-section">
        <h2 class="passport-title">passport</h2>
    
        <div class="passport-container">
            <div class="passport-frame-left">
                <div class="passport-main-image-box">
                    <img src="https://cdn.henleyglobal.com/themes/hgo/public/assets/img/passports/SG.png" alt="Singapore Passport">
                </div>
                <div class="passport-info-rows">
                    <div class="pass-row-name">Singapore</div>
                    <div class="pass-row-rank">1st</div>
                    <div class="pass-row-visa">
                        <span>VISA-FREE DESTINATIONS</span>
                        <span>195</span>
                    </div>
                </div>
            </div>

            <div class="passport-frame-right">
                <div id="passport-grid">
                    <div class="passport-row" id="row-1"></div>
                    <div class="passport-row" id="row-2"></div>
                </div>

                <div class="passport-search-area">
                    <div class="passport-row-lower">
                        <div class="lower-frame">
                            <div class="lower-img"><img src="https://cdn-icons-png.flaticon.com/512/7893/7893979.png"></div>
                            <div class="p-name"><strong>wait</strong></div>
                            <div class="p-rank">wait</div>
                            <div class="p-visa">wait</div>
                            <div class="lower-search">
                                <input type="text" placeholder="Search country..." class="search-input">
                                <div class="search-suggestions"></div>
                            </div>
                        </div>
                        <div class="lower-frame">
                            <div class="lower-img"><img src="https://cdn-icons-png.flaticon.com/512/7893/7893979.png"></div>
                            <div class="p-name"><strong>wait</strong></div>
                            <div class="p-rank">wait</div>
                            <div class="p-visa">wait</div>
                            <div class="lower-search">
                                <input type="text" placeholder="Search country..." class="search-input">
                                <div class="search-suggestions"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="passport-total">199</div>
            </div>
        </div>
    </div>

    <div id="time-wrapper">
        <div class="time-box" id="date-box"></div>
        <div class="time-box" id="clock-box"></div>
    </div>
    <div id="rocket-btn">🚀</div>

    <script>
        /* --- UTILS --- */
        function shuffleArray(arr) {
            let copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function pad(n) { return n.toString().padStart(2, '0'); }

        /* --- 1. SLIDESHOW --- */
        let images = [], currentImg = 0;
        fetch("images.json").then(r => r.json()).then(data => {
            images = shuffleArray(data).slice(0, 10);
            const slideImg = document.getElementById("slide");
            const changeImage = () => {
                if (images.length > 0) {
                    slideImg.src = images[currentImg];
                    currentImg = (currentImg + 1) % images.length;
                }
            };
            changeImage();
            setInterval(changeImage, 5000);
        });

        /* --- 2. CLOCK & UI TOGGLE --- */
        const dateBox = document.getElementById("date-box");
        const clockBox = document.getElementById("clock-box");
        const rocket = document.getElementById("rocket-btn");
        const timeWrapper = document.getElementById("time-wrapper");

        function updateTime() {
            const now = new Date();
            let year = now.getFullYear().toString();
            let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
            let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
            let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

            dateBox.innerHTML = `${year.slice(0,2)}<br>${year.slice(2)}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
            clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        window.addEventListener("scroll", () => {
            const triggerHeight = document.getElementById("slide").offsetHeight;
            const opacity = window.scrollY < triggerHeight ? "0" : "1";
            rocket.style.opacity = opacity;
            timeWrapper.style.opacity = opacity;
        });

        rocket.addEventListener("click", () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        /* --- 3. AIR VIDEO --- */
        const videoEl = document.getElementById("air-video");
        let originalVideos = [], videoList = [], currentVideoIndex = 0;

        fetch("planevideo.json").then(r => r.json()).then(data => {
            originalVideos = data;
            videoList = shuffleArray(originalVideos);
            playNextVideo();
        });

        function playNextVideo() {
            if (videoList.length === 0) return;
            videoEl.src = videoList[currentVideoIndex];
            videoEl.play().catch(()=>{});
            currentVideoIndex++;
            if (currentVideoIndex >= videoList.length) {
                videoList = shuffleArray(originalVideos).slice(0, 10);
                currentVideoIndex = 0;
            }
        }
        videoEl.addEventListener("ended", playNextVideo);

        // Controls
        document.getElementById("mute-btn").addEventListener("click", function() {
            videoEl.muted = !videoEl.muted;
            this.textContent = videoEl.muted ? "⭐" : "🌟";
        });
        document.getElementById("play-btn").addEventListener("click", function() {
            if (videoEl.paused) { videoEl.play(); this.textContent = "⭐"; }
            else { videoEl.pause(); this.textContent = "🌟"; }
        });
        document.getElementById("volume-btn").addEventListener("click", () => {
            const slider = document.getElementById("volume-slider");
            slider.style.display = (slider.style.display === "none") ? "block" : "none";
        });
        document.getElementById("volume-slider").addEventListener("input", (e) => videoEl.volume = e.target.value);

        /* --- 4. AIRLINE LOGO MARQUEE --- */
        let airlineData = [];
        fetch("airline.json").then(r => r.json()).then(data => {
            airlineData = data;
            const top = document.getElementById("row-top");
            const bottom = document.getElementById("row-bottom");
            
            const build = (el, list, dir) => {
                el.innerHTML = "";
                const track = document.createElement("div");
                track.className = "logo-track";
                [...list, ...list].forEach(air => {
                    const item = document.createElement("div");
                    item.className = "logo-item";
                    item.innerHTML = `<img src="${air.logo}" onerror="this.src='https://via.placeholder.com/100'">
                                      <div class="logo-name">${air.name}</div>
                                      <div class="logo-country">${air.country}</div>`;
                    track.appendChild(item);
                });
                el.appendChild(track);
                track.style.animation = `${dir === "left" ? "scroll-left" : "scroll-right"} 250s linear infinite`;
            };

            build(top, shuffleArray(airlineData), "right");
            build(bottom, shuffleArray(airlineData), "left");
        });

        /* --- 5. PASSPORT LOGIC --- */
        let passports = [], passportInfo = {}, cycles = [], currentRound = 0;

        Promise.all([
            fetch("passport.json").then(r => r.json()),
            fetch("passportData.json").then(r => r.json())
        ]).then(([pData, pDetails]) => {
            passports = pData;
            passportInfo = pDetails;
            
            const generate = () => {
                let shuffled = shuffleArray(passports);
                cycles = [];
                for (let i = 0; i < Math.ceil(passports.length / 10); i++) {
                    let slice = shuffled.slice(i * 10, (i + 1) * 10);
                    while(slice.length < 10) slice.push(passports[Math.floor(Math.random()*passports.length)]);
                    cycles.push(slice);
                }
            };

            const render = () => {
                const r1 = document.getElementById("row-1"), r2 = document.getElementById("row-2");
                r1.innerHTML = ""; r2.innerHTML = "";
                cycles[currentRound].forEach((p, i) => {
                    const info = passportInfo[p.name] || {};
                    const div = document.createElement("div");
                    div.className = "passport-item";
                    div.innerHTML = `
                        <div class="img-box"><img src="${p.image}"></div>
                        <div class="p-name">${p.name}</div>
                        <div class="p-rank">${info.rank ? getOrdinal(info.rank) : "..."}</div>
                        <div class="p-visa">${info.visa || "..."}</div>`;
                    if (i < 5) r1.appendChild(div); else r2.appendChild(div);
                });
            };

            generate(); render();
            setInterval(() => {
                currentRound = (currentRound + 1) % cycles.length;
                if(currentRound === 0) generate();
                render();
            }, 20000);

            // Search Logic
            document.querySelectorAll(".lower-frame").forEach(frame => {
                const input = frame.querySelector(".search-input");
                const sugg = frame.querySelector(".search-suggestions");
                input.addEventListener("input", () => {
                    const val = input.value.toLowerCase();
                    const matches = passports.filter(p => p.name.toLowerCase().includes(val));
                    sugg.innerHTML = "";
                    if (val && matches.length) {
                        matches.forEach(m => {
                            const d = document.createElement("div");
                            d.textContent = m.name;
                            d.onclick = () => {
                                input.value = m.name;
                                sugg.style.display = "none";
                                const info = passportInfo[m.name];
                                frame.querySelector(".lower-img img").src = m.image;
                                frame.querySelector(".lower-name").textContent = m.name;
                                frame.querySelector(".lower-rank").textContent = info ? getOrdinal(info.rank) : "wait";
                                frame.querySelector(".lower-visa").textContent = info ? info.visa : "wait";
                            };
                            sugg.appendChild(d);
                        });
                        sugg.style.display = "block";
                    } else sugg.style.display = "none";
                });
            });
        });
    </script>
</body>
</html>
