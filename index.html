<!DOCTYPE html>
<html>
<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

<style>
body {
    margin:0;
    text-align:center;
    background:#fff;
}

h1 {
    font-family:'Satisfy',cursive;
    font-size:70px;
    font-weight:normal;
    margin:40px 0;
    color:#000;
}

img {
    width:100%;
    height:auto;
}

.bottom {
    height:120px;
}

/* --- CONTROL PANEL --- */
#control-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 9999;
}

/* TIME BOX */
.time-box {
    font-family: 'Digital-7', monospace;
    text-align: center;
    line-height: 1.1;
    font-size: 18px;
}

/* WEEKDAY XOAY */
.weekday {
    transform: rotate(90deg);
    display: inline-block;
    margin-top: 5px;
}

/* 2 KHUNG NẰM NGANG */
#time-wrapper {
    display: flex;
    gap: 10px;
}

/* ROCKET */
.control-btn {
    font-size:32px;
    cursor:pointer;
    user-select:none;
}
</style>
</head>

<body>

<h1>wander</h1>
<img id="slide">

<div class="bottom"></div>

<div id="control-panel">

    <!-- TIME -->
    <div id="time-wrapper">
        <!-- DATE -->
        <div class="time-box" id="date-box"></div>

        <!-- CLOCK -->
        <div class="time-box" id="clock-box"></div>
    </div>

    <!-- ROCKET -->
    <div class="control-btn" id="rocket-btn">🚀</div>
</div>

<script>
// =========================
// SLIDESHOW
// =========================
let images=[], current=0;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function changeImage(){
    if(images.length>0){
        document.getElementById("slide").src = images[current];
        current=(current+1)%images.length;
    }
}

fetch("images.json")
.then(r=>r.json())
.then(data=>{
    shuffle(data);
    images=data.slice(0,10);
    changeImage();
    setInterval(changeImage,5000);
});

// =========================
// ROCKET
// =========================
const rocketBtn=document.getElementById("rocket-btn");

rocketBtn.addEventListener("click",()=>{
    window.scrollTo({top:0,behavior:'smooth'});
});

// =========================
// TIME SYSTEM
// =========================
const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n){
    return n.toString().padStart(2,'0');
}

function updateTime(){
    const now = new Date();

    let year = now.getFullYear().toString();
    let yy1 = year.slice(0,2);
    let yy2 = year.slice(2);

    let mm = pad(now.getMonth()+1);
    let dd = pad(now.getDate());

    let weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][now.getDay()];

    let hh = pad(now.getHours());
    let min = pad(now.getMinutes());
    let ss = pad(now.getSeconds());

    // DATE (5 dòng)
    dateBox.innerHTML = `
        ${yy1}<br>
        ${yy2}<br>
        ${mm}<br>
        ${dd}<br>
        <span class="weekday">${weekday}</span>
    `;

    // CLOCK (3 dòng)
    clockBox.innerHTML = `
        ${hh}<br>
        ${min}<br>
        ${ss}
    `;

    updateContrast();
}

// =========================
// AUTO CONTRAST
// =========================
function updateContrast(){
    const img = document.getElementById("slide");
    if(!img.complete || img.naturalWidth === 0) return;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const w = img.naturalWidth;
    const h = img.naturalHeight;

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(img, 0, 0);

    // 🎯 vùng phía sau clock (góc phải dưới)
    const startX = Math.floor(w * 0.75);
    const startY = Math.floor(h * 0.75);
    const size = 10;

    const data = ctx.getImageData(startX, startY, size, size).data;

    let r=0, g=0, b=0, count=0;

    for(let i=0;i<data.length;i+=4){
        r+=data[i];
        g+=data[i+1];
        b+=data[i+2];
        count++;
    }

    r/=count;
    g/=count;
    b/=count;

    const luminance = (0.299*r + 0.587*g + 0.114*b);

    let nr, ng, nb;

    if(luminance > 140){
        nr = r * 0.2;
        ng = g * 0.2;
        nb = b * 0.2;
    } else {
        nr = r + (255 - r) * 0.8;
        ng = g + (255 - g) * 0.8;
        nb = b + (255 - b) * 0.8;
    }

    const color = `rgb(${nr},${ng},${nb})`;

    dateBox.style.color = color;
    clockBox.style.color = color;
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
