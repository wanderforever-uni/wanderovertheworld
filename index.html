<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>

    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

    <style>
        /* --- 1. GENERAL STYLES --- */
        @font-face {
            font-family: 'Typographica';
            src: url('https://db.onlinewebfonts.com/t/24f513903f6f16428807d8534571c667.woff2') format('woff2');
            font-display: swap;
        }

        body {
            margin: 0;
            text-align: center;
            background: #fff;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            /* 70px trên màn hình 3840px tương đương khoảng 1.82vw */
            /* Công thức: (70 / 3840) * 100 = 1.8229 */
            font-size: 5.21vw; 
    
            font-weight: normal;
    
            /* Margin 40px tương đương khoảng 1.04vw */
            margin: 1.04vw 0; 
    
            color: #000;
            text-align: center;
            width: 100%;
            display: block;
        }

        img {
            width: 100%;
            height: auto;       
            aspect-ratio: 16 / 9;  
            object-fit: cover;  
            display: block;

            image-rendering: -webkit-optimize-contrast; /* Hỗ trợ trình duyệt Chrome/Safari */
            image-rendering: high-quality;
        }

        .bottom {
            height: 0.78vw; /* ~30px/3840px */
        }

        /* --- 2. UI ELEMENTS (Clock & Rocket) --- */
        #time-wrapper {
            position: fixed;
            right: 0.52vw;   /* Tương ứng 20px */
            bottom: 4.17vw; /* Tương ứng 160px */
            display: flex;
            gap: 0.52vw;     /* Tương ứng 20px */
            z-index: 9999;
            mix-blend-mode: exclusion;
            pointer-events: none;
        }

        .time-box {
            font-family: 'Digital-7', monospace;
            text-align: center;
            line-height: 1.1;
            font-size: 0.94vw; /* Tương ứng 36px */
            color: #fff;
            filter: contrast(1000%) grayscale(100%);
        }

        .weekday {
            transform: rotate(90deg);
            display: inline-block;
            margin-top: 0.26vw; /* Khoảng cách lề chữ Thứ linh hoạt */
        }

        #rocket-btn {
            position: fixed;
            right: 0.83vw;   /* Tương ứng 32px */
            bottom: 0.52vw;  /* Tương ứng 20px */
            font-size: 1.67vw; /* Tương ứng 64px */
            cursor: pointer;
            user-select: none;
            z-index: 10000;
            transition: transform 0.3s ease; /* Thêm hiệu ứng mượt khi di chuột vào */
        }
        /* Thêm hiệu ứng phóng nhẹ khi di chuột để tăng tính tương tác */
        #rocket-btn:hover {
            transform: scale(1.2);
        }

        /* --- 3. AIR SECTION --- */
        #air-section {
            position: relative;
            /* 1. Thiết lập lề trái và phải bằng nhau để khung LUÔN CĂN GIỮ */
            /* Con số 2.76vw đảm bảo cạnh phải cách Tên lửa đúng 10px trên màn 4K */
            margin-left: 3.8vw;   
            margin-right: 3.8vw;
            margin-top: 0.26vw;    /* ~10px */
            margin-bottom: 1.56vw; /* ~60px */
            padding: 0.26vw;       /* ~10px */
            width: auto;           /* Tự động tính chiều ngang dựa trên margin */
            height: auto;          /* QUAN TRỌNG: Khung sẽ cao bằng nội dung bên trong */
    
            /* Đảm bảo nội dung bên trong (float/absolute nếu có) không làm vỡ khung */
            overflow: hidden;      
            display: block;
        }

        .air-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw;    /* Kích thước chữ "air" 50px */
            text-align: center;  /* Luôn căn giữa trong khung đã được căn giữa */
            width: 100%;
            display: block;
            margin-bottom: 1.5vw; /* Kích thước 30px */
            color: #000;
        }

        .air-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 1.5vw;
            align-items: stretch;          /* Chiều cao 2 bên luôn bằng nhau */
            width: 100%;
            box-sizing: border-box; /* Đảm bảo tính toán kích thước chính xác */
        }

        /* Khung Trái chứa các bộ Logo */
        .air-frame-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            width: 100%;
            margin-top: 0;
        }

        /* Thay đổi các thông số margin cũ của bạn */
        .air-row-top { 
            display: flex; 
            justify-content: center; 
            width: 100%; 
            margin-bottom: 2vw;   /* Giảm xuống từ 2vw */
         }

         .air-row-middle { 
             display: flex; 
             justify-content: center; 
             gap: 4vw;             /* Giảm xuống từ 3vw */
             width: 100%; 
             margin-bottom: 4vw; /* Giảm xuống từ 4vw */
         }

        /* Ô lớn 345x345 */
        .logo-box-large {
            width: 11vw;  /* ~422px trên 4K */
            height: 11vw;
            margin: 0 auto 0.8vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ô nhỏ 160x160 cho Running Logos */
        .logo-box-small {
            width: 4.2vw; /* ~160px trên 4K */
            height: 4.2vw;
            margin: 0 auto 0.3vw;
            display: flex; align-items: center; 
            justify-content: center;
        }
        #video-controls {
            display: flex; 
            justify-content: center; 
            gap: 1.2vw;        /* Khoảng cách linh hoạt */
            margin-top: 0.52vw; 
            width: 100%;
        }

        #video-controls span {
            cursor: pointer; 
            font-size: 1.56vw;   /* Kích thước ngôi sao linh hoạt theo màn hình */
            user-select: none;
        }
        
        #video-controls span:hover {
            transform: scale(1.2);
        }

        #volume-slider {
            display: none; 
            width: 6vw;      /* Thanh trượt linh hoạt */
            margin: 0.4vw auto;
        }
        
        .logo-box-large img, .logo-box-small img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        .air-item { text-align: center; }
        .air-name { 
            font-size: 1vw;     /* Chuyển sang vw để đồng bộ màn hình 4K */
            font-weight: bold; 
            line-height: 1.2; 
            min-height: 2.4vw;    /* Dùng min-height thay vì height */
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            overflow: visible;
        }
        .air-country { 
            font-size: 0.7vw; 
            opacity: 0.7; 
            line-height: 1.2; 
            min-height: 1.7vw; 
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            overflow: visible;
        }

        /* Video 720x1280 */
        #video-container {
            width: 100%;          /* Để nó chiếm hết 0.8fr của cột phải */
            max-width: none;      /* Giới hạn độ rộng vừa phải */
            max-height: none;
            aspect-ratio: 720 / 1280;
            margin: 0 auto;
            background: transparent;
            position: relative;
            overflow: visible;
            display: flex;
            flex-direction: column;
        }

        #air-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Running Logos (Khung 3) - CHUẨN KÍCH THƯỚC 200x200 --- */
        #air-extra { 
            width: 100%; 
            margin-top: 0.78vw; /* ~30px */
        }

        .logo-row {
            width: 100%;
            /* Tăng chiều cao lên để chứa đủ ô 200px và 2 dòng chữ bên dưới */
            height: 9.2vw;      /* Khoảng 280px trên màn 4K để không bị cấn chữ */
            margin: 0.7vw auto; 
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .logo-track {
            display: flex;
            position: absolute;
            flex-wrap: nowrap;
            gap: 0.52vw;        /* Khoảng cách 20px giữa các logo */
            width: max-content;
            will-change: transform; /* Giúp chạy mượt hơn trên mobile/tablet */
        }

        .logo-item { 
            width: 5.0vw; /* ~160px trên 4K */
            height: 5.0vw;
            margin: 0 auto 0.3vw;
            text-align: center; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .logo-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            image-rendering: high-quality;  /* Ưu tiên chất lượng hiển thị */
            margin-bottom: 0.4vw;
        }

        .logo-name { 
            font-size: 0.45vw;  /* Khoảng 16px trên màn 4K */
            font-weight: bold;  /* THÊM DÒNG NÀY ĐỂ IN ĐẬM */
            margin-top: 0.26vw; /* Khoảng cách với logo ~10px */
            color: #000;        /* Đảm bảo màu đen rõ nét */
            text-align: center;
            width: 100%;
            line-height: 1.4;
            height: 1.4vw; 
    
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: visible; /* Thay vì hidden, hãy dùng visible để kiểm tra, sau đó đổi lại hidden khi đã chuẩn */
            margin-top: 0.4vw;
        }

        .logo-country { 
            font-size: 0.42vw;
            font-weight: 500;
            opacity: 0.9;
            text-align: center;
            width: 100%;
            line-height: 1.4;
            height: 1.3vw;
            display: flex;
            align-items: flex-start;
            justify-content: center;
    
            overflow: visible;
            margin-top: 0.1vw;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        @keyframes scroll-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* --- 4. PASSPORT SECTION --- */
        #passport-section {
            position: relative;
            margin-left: 3.8vw;   /* Đồng bộ với Air */
            margin-right: 3.8vw;
            margin-top: 8vw;      /* Khoảng cách giữa 2 section lớn */
            margin-bottom: 5vw;
            padding: 0.26vw;
            width: auto;
            overflow: hidden;
            display: block;
        }    

        .passport-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw;    /* Bằng kích thước chữ "air" */
            text-align: center;
            width: 100%;
            display: block;
            margin-bottom: 1.5vw;
            color: #000;
        }

        .passport-container {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr; /* Tỉ lệ y hệt khung Air */
            gap: 1.5vw;
            align-items: stretch; /* Chiều cao 2 bên bằng nhau */
            width: 100%;
            box-sizing: border-box;
        }

        /* Khung Trái Passport */
        .passport-frame-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            margin-top: 0;               /* Đảm bảo không có lề trên */
            padding-top: 0; /* Đảm bảo không có đệm trên */
        }

        .passport-main-image-box {
            width: 100%; /* Chiếm hết chiều ngang khung trái (~ khung trái Air) */
            aspect-ratio: 1040 / 1477; /* Tỉ lệ chuẩn của passport */
            height: auto;
            max-height: none;
            display: flex;
            overflow: visible;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 1vw;
            background: transparent;
        }

        .passport-main-image-box img {
            width: 100%; /* Ép chiều ngang ảnh phải bằng 100% khung để khít với text */
            height: 100%;
            object-fit: fill;
            display: block;
            /* Đảm bảo chất lượng hình ảnh khi phóng */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
        }

        .passport-info-rows {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8vw; /* Khoảng cách giữa các dòng */
        }

        .pass-row-name {
            font-size: 1.8vw;
            font-weight: bold;
            text-align: center;
            min-height: 4.5vw; /* Phòng hờ 2 dòng nếu tên quá dài */
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pass-row-rank {
            font-size: 1.4vw;
            text-align: center;
            color: #333;
        }

        .pass-row-visa {
            display: flex;
            justify-content: space-between;
            font-size: 1.1vw;
            font-weight: 500;
            padding: 0 1vw;
        }

        /* Khung Phải Passport */
        .passport-frame-right {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #passport-grid {
            display: flex;
            flex-direction: column;
            gap: 2.5vw; /* Khoảng cách giữa 2 hàng passport */
        }

        .passport-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 ô đều nhau */
            gap: 0.8vw;
            width: 100%;
        }

        .passport-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* Khung ô vuông */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.4vw;
        }

        .img-box img {
            height: 100%; /* Lấy chiều dọc làm tiêu chuẩn như bạn yêu cầu */
            max-width: 100%;
            object-fit: contain;
        }

        /* Text trong khung nhỏ */
        .p-name { 
            font-size: 0.65vw; 
            font-weight: bold; 
            min-height: 1.6vw; /* Phòng hờ nhảy dòng */
            line-height: 1.2;
            margin-bottom: 0.2vw;
        }
        .p-rank, .p-visa { font-size: 0.55vw; opacity: 0.8; }

        /* Khung tìm kiếm (Search Section) */
        .passport-search-area {
            margin-top: 1vw;
            margin-bottom: 2vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vw;
        }

        .passport-row-lower {
            display: flex;
            justify-content: center; 
            align-items: flex-start;
            gap: 6vw; 
            width: 100%;
            margin-top: 2vw;
        }

        .lower-frame {
            flex: 0 0 18vw; /* Không để khung tự giãn rộng hết cỡ */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .lower-frame .p-name {
            font-size: 0.55vw;
            font-weight: bold;
            min-height: 1.5vw;
            margin-bottom: 0.3vw;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            line-height: 1.2;
        }

        .lower-frame .p-rank, 
        .lower-frame .p-visa {
            font-size: 0.45vw; 
            opacity: 0.9;
            min-height: 1.1vw; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .lower-img {
            height: 7vw; /* Bằng khoảng 1/2 ô nhỏ ở trên */
            aspect-ratio: 1040 / 1477;
            margin-bottom: 0.5vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lower-img img { height: 100%; object-fit: contain; }

        .lower-search {
            margin-top: 1vw;
            width: 10vw;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 100%;
            height: 2vw;
            padding: 0.4vw 0.4vw; /* Thêm padding trái/phải để chữ không sát viền */
            font-size: 0.5vw;
            border: 1px solid #ccc;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden; 
            white-space: nowrap;
        }

        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #fff;
            border: 1px solid #ccc;
            z-index: 100;
            max-height: 10vw;
            overflow-y: auto;
            display: none; /* Mặc định ẩn */
        }

        .search-suggestions div {
            padding: 0.25vw;
            font-size: 0.45vw;
            cursor: pointer;
            text-align: left;
        }

        .search-suggestions div:hover {
            background-color: #f0f0f0;
        }

        /* Màu nền khi dùng phím mũi tên di chuyển qua các đề xuất */
        .search-suggestions div.active {
            background-color: #e0e0e0 !important;
            font-weight: bold;
            color: #000;
        }

        /* Con số 199 cuối cùng */
        .passport-total {
            margin-top: 2vw;
            opacity: 1;
            font-family: 'Typographica', sans-serif;
            font-size: 8vw; /* Rất lớn và nổi bật */
            text-align: center;
            color: #7B1B38; /* Tím đen - đỏ bordeaux */
        }

        /* --- 6. THANKFULNESS SECTION --- */
        #thankfulness-section {
            position: relative;
            margin-left: 3.8vw;
            margin-right: 3.8vw;
            margin-top: 5vw;
            margin-bottom: 5vw;
            display: block;
            overflow: hidden;
         }

        .thank-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw; /* Cùng kích thước với .air-title */
            text-align: center;
            width: 100%;
            display: block;
            margin-bottom: 2vw; /* Khoảng cách hợp lý xuống khung thông tin */
            color: #000;
        }

        #thank-info-frame {
            width: 80%; /* Chiều rộng hẹp hơn khung Thankfulness để luôn nằm giữa */
            margin: 0 auto;
            position: relative;
            height: 30vw; /* Giới hạn hiển thị khoảng 11 dòng, bạn có thể điều chỉnh theo nội dung */
            overflow: auto; /* Để ẩn các dòng ngoài khung */
            overflow-x: hidden;
            -webkit-mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }

        .thank-scroll-track {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .thank-row {
            display: flex;
            width: 100%;
            margin-bottom: 0.8vw; /* Khoảng cách giữa các dòng */
            font-size: 1vw;
            line-height: 1.4;
            align-items: flex-start;
        }

        .thank-part-1 {
            flex: 0 0 10%; /* Tỉ lệ 1/10 */
            font-weight: bold;
            text-align: right;
            padding-right: 1.5vw;
            box-sizing: border-box;
        }

        .thank-part-2 {
            flex: 0 0 90%; /* Tỉ lệ 9/10 */
            text-align: left;
            word-break: break-all; /* Tránh text quá dài làm vỡ khung */
            opacity: 0.8;
        }

        /* Animation cuộn từ dưới lên */
        @keyframes scroll-up {
            from { transform: translateY(30vw); }
            to { transform: translateY(-100%); }
        }
        #thank-info-frame:hover .thank-scroll-track {
            animation-play-state: paused !important;
        }

        #thank-info-frame::-webkit-scrollbar { display: none; }

        /* --- VOYAGE SECTION --- */
        #voyage-section {
            position: relative;
            margin-left: 3.8vw;   
            margin-right: 3.8vw;
            margin-top: 2vw;       /* Khoảng cách với passport-section */
            margin-bottom: 1.56vw; 
            padding: 0.26vw;       
            width: auto;           
            height: auto;          
            overflow: hidden;      
            display: block;
        }

        .voyage-title {
            font-family: 'Satisfy', cursive;
            font-size: 3.9vw;    
            text-align: center;  
            width: 100%;
            display: block;
            margin-bottom: 1.5vw; 
            color: #000;
            text-transform: lowercase; /* Đảm bảo chữ voyage viết thường như air */
        }

        .voyage-container {
            display: flex;
            justify-content: space-between; /* Voyage 1 sát trái, Voyage 4 sát phải */
            width: 100%;
            background: none;
        }

        .voyage-item {
            width: 23.5%; 
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .voyage-video-wrapper {
            position: relative;
            width: 100%;
            /* Tỷ lệ chuẩn 720x1280 (1280/720 = 1.777) */
            aspect-ratio: 720 / 1280; 
            overflow: hidden;
            background: none;
        }

        .voyage-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .v-video-controls {
            display: flex;
            justify-content: center;
            gap: 1.5vw; /* Khoảng cách giữa các ngôi sao */
            margin-top: 0.8vw;
            cursor: pointer;
            user-select: none;
        }

        .v-mute-btn, .v-play-btn, .v-volume-btn {
            font-size: 1.5vw; /* Kích thước icon ngôi sao */
        }

        .v-volume-slider {
            display: none;
            width: 50%;
            margin-top: 0.5vw;
            cursor: pointer;
            height: 1vw;
        }

    </style>
</head>

<body>

    <h1>wander</h1>
    <img id="slide">
    <div class="bottom"></div>

    <script>
        /* --- UTILS --- */
        function shuffleArray(arr) {
            let copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function pad(n) { return n.toString().padStart(2, '0'); }

        /* --- 1. SLIDESHOW --- */
        let images = [], currentImg = 0;

        fetch("images.json")
            .then(r => r.json())
            .then(data => {
                // Lưu toàn bộ danh sách gốc vào một biến để dùng lâu dài
                const allImages = data; 
        
                // Tạo lượt chiếu đầu tiên: xáo trộn tất cả ảnh
                images = shuffleArray(allImages);

                const slideImg = document.getElementById("slide");

                const changeImage = () => {
                    if (images.length > 0) {
                        slideImg.src = images[currentImg];
                        currentImg++;

                        // Kiểm tra nếu đã chiếu hết danh sách hiện tại
                        if (currentImg >= images.length) {
                            // Tạo một lượt mới: xáo trộn lại toàn bộ từ danh sách gốc
                            images = shuffleArray(allImages);
                            currentImg = 0; // Reset về hình đầu tiên của lượt mới
                        }
                    }
                };

                // Chạy hình đầu tiên ngay lập tức
                changeImage();
                // Cứ mỗi 5 giây chuyển hình một lần
                setInterval(changeImage, 5000);
            });

        /* --- 2. CLOCK & UI TOGGLE --- */
        const dateBox = document.getElementById("date-box");
        const clockBox = document.getElementById("clock-box");
        const rocket = document.getElementById("rocket-btn");
        const timeWrapper = document.getElementById("time-wrapper");

        function updateTime() {
            const now = new Date();
            let year = now.getFullYear().toString();
            let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
            let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
            let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

            dateBox.innerHTML = `${year.slice(0,2)}<br>${year.slice(2)}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
            clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        window.addEventListener("scroll", () => {
            const triggerHeight = document.getElementById("slide").offsetHeight;
            const opacity = window.scrollY < triggerHeight ? "0" : "1";
            rocket.style.opacity = opacity;
            timeWrapper.style.opacity = opacity;
        });

        rocket.addEventListener("click", () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        /* --- 3. AIR VIDEO --- */
        const videoEl = document.getElementById("air-video");
        let allAirVideos = []; // Kho lưu trữ gốc
        let currentAirPlaylist = []; // Danh sách xáo trộn đang dùng
        let airVideoIdx = 0;

        fetch("planevideo.json?v=" + Date.now()) // Thêm anti-cache để cập nhật file ngay lập tức
            .then(r => r.json())
            .then(data => {
                allAirVideos = data;
                startNewAirCycle(); // Tạo lượt chiếu đầu tiên
            });

        function startNewAirCycle() {
            // Xáo trộn toàn bộ danh sách gốc
            currentAirPlaylist = shuffleArray(allAirVideos);
            airVideoIdx = 0;
            playAirVideo();
        }

        function playAirVideo() {
            if (currentAirPlaylist.length === 0) return;

            videoEl.src = currentAirPlaylist[airVideoIdx];
            videoEl.play().catch(() => {
                console.log("Trình duyệt chặn tự động phát có âm thanh, đang phát ở chế độ tắt tiếng.");
            });

            // Lắng nghe sự kiện kết thúc video để chuyển bài
            videoEl.onended = () => {
                airVideoIdx++;
        
                // Kiểm tra nếu đã chiếu hết danh sách hiện tại
                if (airVideoIdx >= currentAirPlaylist.length) {
                    startNewAirCycle(); // Hết lượt thì xáo trộn lại từ đầu với thứ tự mới
                } else {
                    playAirVideo(); // Còn video thì chiếu tiếp
                }
            };
        }

        // Controls
        document.getElementById("mute-btn").addEventListener("click", function() {
            videoEl.muted = !videoEl.muted;
            this.textContent = videoEl.muted ? "⭐" : "🌟";
        });
        document.getElementById("play-btn").addEventListener("click", function() {
            if (videoEl.paused) { videoEl.play(); this.textContent = "⭐"; }
            else { videoEl.pause(); this.textContent = "🌟"; }
        });
        document.getElementById("volume-btn").addEventListener("click", () => {
            const slider = document.getElementById("volume-slider");
            slider.style.display = (slider.style.display === "none") ? "block" : "none";
        });
        document.getElementById("volume-slider").addEventListener("input", (e) => videoEl.volume = e.target.value);

        /* --- 4. AIRLINE LOGO MARQUEE --- */
        fetch("airline.json?v=" + Date.now())
            .then(r => r.json())
            .then(data => {
                const top = document.getElementById("row-top");
                const bottom = document.getElementById("row-bottom");

                const setupContinuousMarquee = (container, list, direction) => {
                    let currentList = shuffleArray([...list]);
            
                    const createTrackContent = (items) => {
                        // Nhân đôi danh sách để tạo hiệu ứng nối đuôi
                        return [...items, ...items].map(air => `
                            <div class="logo-item">
                                <img src="${air.logo}" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
                                <div class="logo-name">${air.name}</div>
                                <div class="logo-country">${air.country}</div>
                            </div>
                        `).join('');
                    };

                    container.innerHTML = `<div class="logo-track">${createTrackContent(currentList)}</div>`;
                    const track = container.querySelector('.logo-track');

                    // Thiết lập tốc độ dựa trên số lượng logo
                    const duration = list.length * 8; 
                    track.style.animation = `${direction === "left" ? "scroll-left" : "scroll-right"} ${duration}s linear infinite`;

                    // LẮNG NGHE SỰ KIỆN: Mỗi khi animation lặp lại (hết 1 vòng)
                    track.addEventListener('animationiteration', () => {
                        // 1. Xáo trộn danh sách mới cho lượt tiếp theo
                        const newList = shuffleArray([...list]);
                
                        // 2. Cập nhật nội dung mới vào track
                        // Việc cập nhật này diễn ra ngay khi track nhảy về vị trí 0%, 
                        // giúp lượt chạy tiếp theo có thứ tự khác hoàn toàn.
                        track.innerHTML = createTrackContent(newList);
                    });
                };

                setupContinuousMarquee(top, data, "right");
                setupContinuousMarquee(bottom, data, "left");
            });

        /* --- 5. PASSPORT LOGIC --- */
        let passports = [], passportInfo = {}, cycles = [], currentRound = 0;

        Promise.all([
            fetch("passport.json").then(r => r.json()),
            fetch("passportData.json").then(r => r.json())
        ]).then(([pData, pDetails]) => {
            passports = pData;
            passportInfo = pDetails;
            
            const generate = () => {
                let shuffled = shuffleArray(passports);
                cycles = [];
                for (let i = 0; i < Math.ceil(passports.length / 10); i++) {
                    let slice = shuffled.slice(i * 10, (i + 1) * 10);
                    while(slice.length < 10) slice.push(passports[Math.floor(Math.random()*passports.length)]);
                    cycles.push(slice);
                }
            };

            const render = () => {
                const r1 = document.getElementById("row-1"), r2 = document.getElementById("row-2");
                r1.innerHTML = ""; r2.innerHTML = "";
                cycles[currentRound].forEach((p, i) => {
                    const countryKey = p.name.normalize("NFC").toUpperCase().trim();
                    const info = passportInfo[countryKey] || {};
                    const div = document.createElement("div");
                    div.className = "passport-item";
                    div.innerHTML = `
                        <div class="img-box"><img src="${p.image}"></div>
                        <div class="p-name">${p.name}</div>
                        <div class="p-rank">${info.rank ? getOrdinal(info.rank) : "..."}</div>
                        <div class="p-visa">${info.visa || "..."}</div>`;
                    if (i < 5) r1.appendChild(div); else r2.appendChild(div);
                });
            };

            generate(); render();
            setInterval(() => {
                currentRound = (currentRound + 1) % cycles.length;
                if(currentRound === 0) generate();
                render();
            }, 20000);

            // Search Logic (Updated với phím mũi tên và Enter)
            document.querySelectorAll(".lower-frame").forEach(frame => {
                const input = frame.querySelector(".search-input");
                const sugg = frame.querySelector(".search-suggestions");
                let currentFocus = -1; // Biến theo dõi dòng đang chọn cho riêng từng khung

                input.addEventListener("input", () => {
                    const val = input.value.toLowerCase();
                    const matches = passports.filter(p => p.name.toLowerCase().includes(val));
                    sugg.innerHTML = "";
                    currentFocus = -1; // Reset vị trí chọn khi gõ chữ mới

                    if (val && matches.length) {
                        matches.forEach(m => {
                            const d = document.createElement("div");
                            d.textContent = m.name;
                            d.onclick = () => {
                                input.value = m.name;
                                sugg.style.display = "none";
                                const countryKey = m.name.normalize("NFC").toUpperCase().trim();
                                const info = passportInfo[countryKey];
                                frame.querySelector(".lower-img img").src = m.image;
                                frame.querySelector(".p-name").textContent = m.name;
                                frame.querySelector(".p-rank").textContent = info ? getOrdinal(info.rank) : "wait";
                                frame.querySelector(".p-visa").textContent = info ? info.visa : "wait";
                            };
                            sugg.appendChild(d);
                        });
                        sugg.style.display = "block";
                    } else {
                        sugg.style.display = "none";
                    }
                });

                // Xử lý sự kiện bàn phím
                input.addEventListener("keydown", function(e) {
                    let x = sugg.getElementsByTagName("div");
                    if (e.key === "ArrowDown") {
                        currentFocus++;
                        addActive(x);
                    } else if (e.key === "ArrowUp") {
                        currentFocus--;
                        addActive(x);
                    } else if (e.key === "Enter") {
                        e.preventDefault();
                        if (currentFocus > -1) {
                            if (x) x[currentFocus].click();
                        }
                    }
                });

                function addActive(x) {
                    if (!x || x.length === 0) return false;
                    removeActive(x);
                    if (currentFocus >= x.length) currentFocus = 0;
                    if (currentFocus < 0) currentFocus = x.length - 1;
                    x[currentFocus].classList.add("active");
                    // Đảm bảo dòng được chọn luôn hiển thị trong khung cuộn
                    x[currentFocus].scrollIntoView({ block: "nearest" });
                }

                function removeActive(x) {
                    for (let i = 0; i < x.length; i++) {
                        x[i].classList.remove("active");
                    }
                }

                // Ẩn danh sách khi nhấp chuột ra ngoài
                document.addEventListener("click", function (e) {
                    if (e.target !== input && e.target !== sugg) {
                        sugg.style.display = "none";
                    }
                });
            });
        });
        /* --- 6. THANKFULNESS LOGIC --- */
        const thankTrack = document.getElementById("thank-track");
        const thankFrame = document.getElementById("thank-info-frame");

        function loadThankfulness() {
            fetch("thankfulness.json")
                .then(response => response.json())
                .then(data => {
                    let thankData = data;

                    const renderScroll = () => {
                        thankTrack.innerHTML = "";
                        // 1. Nhóm dữ liệu theo nội dung ở Mục 1 (item[0])
                        const groups = thankData.reduce((acc, item) => {
                            const key = item[0];
                            if (!acc[key]) acc[key] = [];
                            acc[key].push(item);
                            return acc;
                        }, {});

                        // 2. Xử lý xáo trộn
                        let finalArray = [];
    
                        // Lấy danh sách các nhóm (keys) và xáo trộn thứ tự xuất hiện của các nhóm
                        const groupKeys = shuffleArray(Object.keys(groups));

                        groupKeys.forEach(key => {
                            // Xáo trộn nội bộ các dòng trong cùng một nhóm
                            const shuffledGroup = shuffleArray(groups[key]);
                            // Nối vào mảng cuối cùng
                            finalArray = finalArray.concat(shuffledGroup);
                        });

                        // 3. Hiển thị dữ liệu đã được xử lý
                        finalArray.forEach(item => {
                            const row = document.createElement("div");
                            row.className = "thank-row";
                            row.innerHTML = `
                                <div class="thank-part-1">${item[0]}</div>
                                <div class="thank-part-2">${item[1]}</div>
                            `;
                            thankTrack.appendChild(row);
                        });

                        thankTrack.style.paddingTop = "30vw"; 
                        thankTrack.style.paddingBottom = "30vw";
                
                        // Reset vị trí cuộn về 0 (đỉnh của padding-top)
                        thankFrame.scrollTop = 0;

                        // Tắt animation CSS cũ để dùng JS điều khiển
                        thankTrack.style.animation = "none";
                        thankTrack.style.position = "relative"; 
                
                        // Thiết lập trạng thái ban đầu
                        startAutoScroll();
                    };

                    let scrollInterval;
                    let isHovered = false;

                    function startAutoScroll() {
                        if (scrollInterval) clearInterval(scrollInterval);
                        scrollInterval = setInterval(() => {
                            if (!isHovered) {
                                // Tự động cuộn xuống 1px
                                thankFrame.scrollTop += 1;
                        
                                // Nếu cuộn hết thì quay lại đầu (Loop)
                                if (thankFrame.scrollTop >= (thankFrame.scrollHeight - thankFrame.offsetHeight)) {
                                    thankFrame.scrollTop = 0;
                                    renderScroll(); // Xáo trộn lại khi xong 1 vòng
                                }
                            }
                        }, 60); // Tốc độ cuộn (ms), số càng nhỏ cuộn càng nhanh
                    }

                   // --- THAY ĐỔI Ở ĐÂY ĐỂ ÉP CHẠY NGAY KHI RELOAD ---
                   renderScroll();

                   // Đợi trình duyệt vẽ xong hoàn toàn (Double Frame)
                   requestAnimationFrame(() => {
                       requestAnimationFrame(() => {
                           // Kích hoạt vòng lặp cuộn
                        step();
                       });
                  });

                    // Khi di chuột ra khỏi khung, đảm bảo animation chạy tiếp từ vị trí hiện tại
                    thankFrame.addEventListener("mouseleave", () => {
                        isHovered = false;
                        thankFrame.style.overflowY = "hidden"; // Ẩn scroll để trông sạch sẽ
                        startAutoScroll();
                    });

                    // Khi di chuột vào, tạm dừng
                    thankFrame.addEventListener("mouseenter", () => {
                        isHovered = true;
                        thankFrame.style.overflowY = "auto"; // Hiện scroll để lăn chuột
                    });

                    // Lắng nghe sự kiện animation lặp lại để xáo trộn lại thứ tự
                    thankTrack.addEventListener('animationiteration', () => {
                        renderScroll();
                    });
                });
        }

        loadThankfulness();

        /* --- 7. VOYAGE LOGIC --- */
        const vVideos = document.querySelectorAll(".voyage-video");
        let vMasterList = [];
        let vPlaylists = [[], [], [], []]; 
        let vCurrentIdx = [0, 0, 0, 0];

        fetch("Voyagevideo.json").then(r => r.json()).then(data => {
            vMasterList = data;
            // Khởi tạo 4 playlist xáo trộn khác nhau hoàn toàn
            for (let i = 0; i < 4; i++) {
                vPlaylists[i] = shuffle([...vMasterList]);
            }
            vVideos.forEach((_, i) => playVideo(i));
        });

        // Hàm xáo bài chuẩn (Fisher-Yates) để đảm bảo ngẫu nhiên tốt hơn sort()
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function playVideo(frameIdx) {
            const video = vVideos[frameIdx];

            // Lấy video hiện tại từ playlist 12 cái của khung này
            let nextVideo = vPlaylists[frameIdx][vCurrentIdx[frameIdx]];

            // 1. Lấy danh sách src thực tế từ 3 khung kia ĐANG CHIẾU
            let currentlyPlaying = Array.from(vVideos)
                .map((v, idx) => idx !== frameIdx ? v.getAttribute('src') : null)
                .filter(src => src !== null);

            // 2. KIỂM TRA TRÙNG (Yêu cầu 3 & Yêu cầu mới): 
            // Nếu video định chiếu trùng với khung khác ĐANG CHIẾU, tìm cái khác trong playlist 12 cái
            if (currentlyPlaying.some(src => src && src.includes(nextVideo))) {
                for (let i = vCurrentIdx[frameIdx] + 1; i < vPlaylists[frameIdx].length; i++) {
                    // Kiểm tra video ở vị trí i có đang bị khung nào khác chiếm dụng không
                    if (!currentlyPlaying.some(src => src && src.includes(vPlaylists[frameIdx][i]))) {
                        // Tráo đổi vị trí hiện tại với vị trí i để bảo toàn danh sách 12 video
                        [vPlaylists[frameIdx][vCurrentIdx[frameIdx]], vPlaylists[frameIdx][i]] = 
                        [vPlaylists[frameIdx][i], vPlaylists[frameIdx][vCurrentIdx[frameIdx]]];
                        nextVideo = vPlaylists[frameIdx][vCurrentIdx[frameIdx]];
                        break;
                    }
                }
            }

            // 3. Gán và Phát
            video.src = nextVideo;
            video.muted = true;
            video.loop = false; // TẮT loop để kích hoạt sự kiện onended chuyển sang video thứ 5, 6...
            video.play().catch(() => {});

            // 4. Khi kết thúc 1 video:
            video.onended = () => {
                vCurrentIdx[frameIdx]++; // Tiến tới video tiếp theo trong danh sách 12 cái
        
                // Nếu đã chiếu hết sạch 12 video của lượt này
                if (vCurrentIdx[frameIdx] >= vPlaylists[frameIdx].length) {
                    // Trộn lại lượt mới với thứ tự khác hoàn toàn (Yêu cầu 2)
                    vPlaylists[frameIdx] = shuffle([...vMasterList]);
                    vCurrentIdx[frameIdx] = 0;
                }
        
                playVideo(frameIdx);
            };
        }
        
        // --- Giữ nguyên logic điều khiển Icon (Mute, Play, Volume) như cũ ---
        vVideos.forEach((video, i) => {
            const parent = video.closest('.voyage-item');
            const mBtn = parent.querySelector(".v-mute-btn");
            const pBtn = parent.querySelector(".v-play-btn");
            const vBtn = parent.querySelector(".v-volume-btn");
            const sld = parent.querySelector(".v-volume-slider");

            mBtn.onclick = () => {
                video.muted = !video.muted;
                mBtn.textContent = video.muted ? "⭐" : "🌟";
            };

            pBtn.onclick = () => {
                if (video.paused) { video.play(); pBtn.textContent = "⭐"; }
                else { video.pause(); pBtn.textContent = "🌟"; }
            };

            vBtn.onclick = () => {
                sld.style.display = (sld.style.display === "none" || sld.style.display === "") ? "block" : "none";
            };

            sld.oninput = (e) => video.volume = e.target.value;
        });

    </script>
</body>
</html>
