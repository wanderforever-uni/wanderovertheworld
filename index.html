<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <style>
        /* =========================
           GLOBAL STYLES
        ========================= */
        body {
            margin: 0;
            text-align: center;
            background: #fff;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 70px;
            font-weight: normal;
            margin: 40px 0;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        .bottom {
            height: 120px;
        }

        /* Hide the YouTube player container */
        #player {
            position: absolute;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>

    <h1>wander</h1>

    <img id="slide" alt="slideshow">

    <div id="player"></div>

    <div class="bottom"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /* =========================
           SLIDESHOW LOGIC
        ========================= */
        let images = [];
        let current = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function changeImage() {
            if (images.length > 0) {
                document.getElementById("slide").src = images[current];
                current = (current + 1) % images.length;
            }
        }

        fetch("images.json")
            .then(res => res.json())
            .then(data => {
                shuffle(data);
                images = data.slice(0, 10);
                changeImage();
                setInterval(changeImage, 5000);
            })
            .catch(err => console.error("Error loading images.json:", err));

        /* =========================
           YOUTUBE MUSIC LOGIC
        ========================= */
        let musicList = [];
        let currentTrack = 0;
        let player;
        let playerReady = false;

        // Optimized Regex for your specific music.json links
        function getVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onYouTubeIframeAPIReady() {
            fetch("music.json")
                .then(res => res.json())
                .then(data => {
                    shuffle(data);
                    musicList = data;
                    const firstId = getVideoId(musicList[0]);

                    player = new YT.Player('player', {
                        height: '0',
                        width: '0',
                        videoId: firstId,
                        playerVars: {
                            'autoplay': 1,
                            'controls': 0,
                            'mute': 1 // Start muted to bypass browser autoplay restrictions
                        },
                        events: {
                            'onReady': onPlayerReady,
                            'onStateChange': onPlayerStateChange
                        }
                    });
                })
                .catch(err => console.error("Error loading music.json:", err));
        }

        function onPlayerReady(event) {
            playerReady = true;
            event.target.playVideo();
            console.log("Music loaded and playing in background (muted).");
        }

        function onPlayerStateChange(event) {
            // When a song ends, wait 3 seconds then play next
            if (event.data === YT.PlayerState.ENDED) {
                setTimeout(() => {
                    currentTrack = (currentTrack + 1) % musicList.length;
                    const nextId = getVideoId(musicList[currentTrack]);
                    player.loadVideoById(nextId);
                }, 3000);
            }
        }

        /* =========================
           AUTOPLAY FIX: UNMUTE ON CLICK
        ========================= */
        // Browser requires a user gesture to enable audio
        document.body.addEventListener("click", () => {
            if (playerReady && player) {
                player.unMute();
                player.setVolume(50);
                player.playVideo();
                console.log("Audio enabled by user interaction.");
            }
        }, { once: true });

    </script>
</body>
</html>
