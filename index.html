<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: clamp(45px, 12vw, 75px);
            font-weight: normal;
            margin: 45px 0;
            color: #222;
        }

        /* Trình chiếu ảnh */
        #slide {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 1.2s ease-in-out;
            background-color: #eee; /* Nền tạm khi chưa load ảnh */
        }

        /* GÓC ĐIỀU KHIỂN & ĐỒNG HỒ (DƯỚI PHẢI) */
        #widgetArea {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            z-index: 9999;
            color: #fff;
            /* Đảm bảo chữ luôn nổi bật trên mọi màu ảnh */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.3);
        }

        /* Cụm nút Emoji */
        .btn-stack {
            display: flex;
            flex-direction: column-reverse; /* Xếp từ dưới lên */
            gap: 15px;
            align-items: center;
        }

        .emoji-icon {
            font-size: 26px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .emoji-icon:hover { transform: scale(1.25); }

        /* Panel Âm lượng */
        #volPanel {
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 12px 8px;
            border-radius: 20px;
            margin-bottom: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Đồng hồ Digital */
        #digitalClock {
            display: flex;
            gap: 6px;
            font-family: 'Share Tech Mono', monospace;
            line-height: 1;
        }
        .col { display: flex; flex-direction: column; align-items: center; }
        .date-part { font-size: 13px; font-weight: bold; margin-bottom: 2px; }
        .time-part { font-size: 32px; font-weight: bold; letter-spacing: 1px; }
        .day-label { writing-mode: vertical-rl; font-size: 11px; text-transform: uppercase; margin-left: 2px; }

        input[type=range] { cursor: pointer; accent-color: #fff; }
    </style>
</head>
<body>

<h1>wander</h1>

<img id="slide" src="" alt="loading context...">

<div id="player"></div>

<div id="widgetArea">
    <div class="btn-stack">
        <div class="emoji-icon" title="Go to top" onclick="window.scrollTo({top:0, behavior:'smooth'})">🔝</div>
        <div class="emoji-icon" id="playToggle" title="Play/Pause">☁️</div>
        <div style="position: relative; display: flex; flex-direction: column; align-items: center;">
            <div id="volPanel">
                <input type="range" id="volControl" min="0" max="100" value="100" style="width: 70px;">
            </div>
            <div class="emoji-icon" id="volToggle" title="Volume">☁️</div>
        </div>
    </div>

    <div id="digitalClock">
        <div class="col date-part">
            <span id="y_hi">--</span><span id="y_lo">--</span>
            <span id="mo">--</span><span id="da">--</span>
        </div>
        <div class="col time-part">
            <span id="hr">00</span><span id="mn">00</span><span id="sc">00</span>
        </div>
        <div class="day-label" id="dayName">---</div>
    </div>
</div>
