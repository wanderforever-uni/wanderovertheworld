<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>wander</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  body { margin: 0; text-align: center; background-color: #fff; }
  h1 { font-family: 'Satisfy', cursive; font-size: 70px; font-weight: normal; margin: 40px 0; }
  img#slide { width: 100%; height: auto; display: block; }

  /* Cụm điều khiển tổng góc dưới bên phải */
  #status-bar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: flex-end;
    gap: 15px;
    z-index: 9999;
    /* Dùng đổ bóng để chữ trắng luôn nổi bật trên mọi nền ảnh */
    color: white;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
  }

  /* Nhóm Emoji xếp dọc */
  .emoji-controls {
    display: flex;
    flex-direction: column-reverse;
    gap: 12px;
    align-items: center;
  }
  .emoji-btn { font-size: 24px; cursor: pointer; user-select: none; }
  
  #vol-input { 
    display: none; 
    background: rgba(0,0,0,0.6); 
    padding: 10px; 
    border-radius: 20px; 
    margin-bottom: 5px;
  }

  /* Đồng hồ */
  #clock-box { display: flex; gap: 6px; font-family: 'Share Tech Mono', monospace; line-height: 1; }
  .c-col { display: flex; flex-direction: column; align-items: center; }
  .c-date { font-size: 12px; }
  .c-time { font-size: 28px; font-weight: bold; }
  .c-day { writing-mode: vertical-rl; font-size: 10px; text-transform: uppercase; }
</style>
</head>
<body>

<h1>wander</h1>
<img id="slide">

<div id="player" style="display:none;"></div>

<div id="status-bar">
  <div class="emoji-controls">
    <div class="emoji-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">🔝</div>
    <div class="emoji-btn" id="play-btn">☁️</div>
    <div style="position:relative; display:flex; flex-direction:column; align-items:center;">
        <div id="vol-input"><input type="range" id="volume-slider" min="0" max="100" value="100" style="width:70px;"></div>
        <div class="emoji-btn" id="vol-btn">☁️</div>
    </div>
  </div>

  <div id="clock-box">
    <div class="c-col c-date">
      <span id="y1"></span><span id="y2"></span>
      <span id="mo"></span><span id="da"></span>
    </div>
    <div class="c-col c-time">
      <span id="hh">00</span><span id="mm">00</span><span id="ss">00</span>
    </div>
    <div class="c-day" id="dname">---</div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* SLIDESHOW GỐC CỦA BẠN */
let images = [];
let current = 0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

fetch("images.json").then(r=>r.json()).then(data=>{
  shuffle(data);
  images = data.slice(0,10);
  if(images.length>0){
    document.getElementById("slide").src = images[0];
    setInterval(()=>{
      current = (current+1)%images.length;
      document.getElementById("slide").src = images[current];
    }, 5000);
  }
});

/* NHẠC YOUTUBE GỐC CỦA BẠN */
let player, musicList=[], started=false;
function getVideoId(url){ let m=url.match(/v=([^&]+)/); return m?m[1]:null; }

function onYouTubeIframeAPIReady(){
  fetch("music.json").then(r=>r.json()).then(data=>{
    shuffle(data);
    musicList = data;
    if(musicList.length>0){
      player = new YT.Player('player',{
        height:'0', width:'0', videoId: getVideoId(musicList[0]),
        events: {'onStateChange': (e)=>{ if(e.data===YT.PlayerState.ENDED){
          let next = Math.floor(Math.random()*musicList.length);
          player.loadVideoById(getVideoId(musicList[next]));
        }}}
      });
    }
  });
}

// Click bất kỳ đâu để bật nhạc lần đầu
document.body.addEventListener("click", ()=>{
  if(player && !started){ player.playVideo(); started=true; }
}, {once:true});

/* ĐIỀU KHIỂN */
document.getElementById('play-btn').onclick = (e)=>{
  e.stopPropagation();
  if(!player) return;
  player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo();
};

document.getElementById('vol-btn').onclick = (e)=>{
  e.stopPropagation();
  let v = document.getElementById('vol-input');
  v.style.display = (v.style.display==='block')?'none':'block';
};

document.getElementById('volume-slider').oninput = (e)=>{
  player.setVolume(e.target.value);
};

/* ĐỒNG HỒ */
function update(){
  const n = new Date();
  const y = String(n.getFullYear());
  document.getElementById('y1').innerText = y.slice(0,2);
  document.getElementById('y2').innerText = y.slice(2);
  document.getElementById('mo').innerText = String(n.getMonth()+1).padStart(2,'0');
  document.getElementById('da').innerText = String(n.getDate()).padStart(2,'0');
  document.getElementById('hh').innerText = String(n.getHours()).padStart(2,'0');
  document.getElementById('mm').innerText = String(now=n.getMinutes()).padStart(2,'0');
  document.getElementById('ss').innerText = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('dname').innerText = n.toLocaleDateString('en-US',{weekday:'short'});
}
setInterval(update, 1000); update();
</script>
</body>
</html>
