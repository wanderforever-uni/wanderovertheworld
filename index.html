<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>时刻 - wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            text-align: center;
            background-color: #fff;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 70px;
            font-weight: normal;
            margin: 40px 0;
        }

        img#slide {
            width: 100%;
            height: auto;
            transition: opacity 1s ease-in-out;
        }

        /* VÙNG ĐIỀU KHIỂN GÓC PHẢI */
        #mainControls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            z-index: 999;
            mix-blend-mode: difference; 
            color: white; 
        }

        .emoji-group {
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            align-items: center;
        }

        .emoji-btn {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            position: relative;
        }

        .emoji-btn:hover { transform: scale(1.3); }

        .sub-panel {
            display: none;
            position: absolute;
            right: 40px;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
        }

        /* ĐỒNG HỒ */
        #clockContainer {
            display: flex;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            line-height: 1;
        }

        .vertical { display: flex; flex-direction: column; align-items: center; }
        .dateBox { font-size: 12px; justify-content: center; }
        .clock { font-size: 24px; font-weight: bold; }
        .dayName { writing-mode: vertical-rl; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<h1>wander</h1>
<img id="slide">

<div id="player" style="display:none"></div>

<div id="mainControls">
    <div class="emoji-group">
        <div class="emoji-btn" id="btnRocket" title="Lên đầu trang">🔝</div>
        <div class="emoji-btn" id="btnCloud1" title="Play/Pause">☁️</div>
        <div class="emoji-btn" id="btnCloud3" title="Âm lượng">
            ☁️
            <div id="panelVolume" class="sub-panel" style="bottom:0;">
                <input type="range" id="volSlider" min="0" max="100" value="100">
            </div>
        </div>
    </div>

    <div id="clockContainer">
        <div class="vertical dateBox">
            <div class="year1">--</div>
            <div class="year2">--</div>
            <div class="month">--</div>
            <div class="day">--</div>
            <div class="dayName">---</div>
        </div>
        <div class="vertical clock">
            <div class="hh">--</div>
            <div class="mm">--</div>
            <div class="ss">--</div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* --- HỆ THỐNG ẢNH --- */
let images = [];
let currentImg = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function changeImage() {
    if (images.length === 0) return;
    const slide = document.getElementById("slide");
    slide.style.opacity = 0;
    setTimeout(() => {
        slide.src = images[currentImg];
        slide.style.opacity = 1;
        currentImg = (currentImg + 1) % images.length;
    }, 1000);
}

fetch("images.json")
    .then(res => res.json())
    .then(data => {
        shuffle(data);
        images = data.slice(0, 10);
        changeImage();
        setInterval(changeImage, 7000);
    });

/* --- HỆ THỐNG NHẠC --- */
let musicList = [];
let player;
let musicStarted = false;

function getVideoId(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
}

function onYouTubeIframeAPIReady() {
    fetch("music.json")
        .then(res => res.json())
        .then(data => {
            shuffle(data);
            musicList = data;
            if (musicList.length === 0) return;
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: getVideoId(musicList[0]),
                events: { 'onStateChange': onPlayerStateChange }
            });
        });
}

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        // Tự động chuyển bài sau 5s khi kết thúc
        let nextIndex = Math.floor(Math.random() * musicList.length);
        player.loadVideoById(getVideoId(musicList[nextIndex]));
    }
}

/* --- ĐIỀU KHIỂN --- */
document.body.onclick = () => {
    if (player && !musicStarted) {
        player.playVideo();
        musicStarted = true;
    }
};

document.getElementById('btnRocket').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

document.getElementById('btnCloud1').onclick = (e) => {
    e.stopPropagation();
    if(!player) return;
    const state = player.getPlayerState();
    state === 1 ? player.pauseVideo() : player.playVideo();
};

document.getElementById('btnCloud3').onclick = (e) => {
    e.stopPropagation();
    const v = document.getElementById('panelVolume');
    v.style.display = (v.style.display === 'block') ? 'none' : 'block';
};

document.getElementById('volSlider').oninput = (e) => {
    player.setVolume(e.target.value);
};
