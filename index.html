<!DOCTYPE html>
<html>
<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

<style>
body {
    margin: 0;
    text-align: center;
    background: #fff;
}

h1 {
    font-family: 'Satisfy', cursive;
    font-size: 70px;
    font-weight: normal;
    margin: 40px 0;
    color: #000;
}

img {
    width: 100%;
    height: auto;
    display: block;
}

.bottom {
    height: 120px;
}

/* --- TIME WRAPPER --- */
#time-wrapper {
    position: fixed;
    right: 20px;
    bottom: 65px;
    display: flex;
    gap: 10px;
    z-index: 9999;

    mix-blend-mode: exclusion; /* 🔥 đổi từ difference */
    pointer-events: none;
}

.time-box {
    font-family: 'Digital-7', monospace;
    text-align: center;
    line-height: 1.1;
    font-size: 18px;

    color: #fff;

    filter: contrast(1000%) grayscale(100%); 
    /* 🔥 ép về chỉ đen/trắng tuyệt đối */
}
    
.weekday {
    transform: rotate(90deg);
    display: inline-block;
    margin-top: 5px;
}

/* --- ROCKET --- */
#rocket-btn {
    position: fixed;
    right: 32px;
    bottom: 20px;
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    z-index: 10000;
}

/* --- AIR SECTION --- */
#air-section {
    max-width: calc(100% - 80px);
    margin: 60px auto;
    padding: 10px;
}

/* tiêu đề */
.air-title {
    font-family: 'Satisfy', cursive;
    font-size: 50px;
    text-align: center;
    margin-bottom: 30px;
    color: #000;
}

/* container 2 khung */
.air-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* mỗi khung */
.air-frame {
    min-height: 100px;
}

/* group bên trong khung 1 */
.air-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* item */
.air-item {
    text-align: center;
}

/* ô trên cùng */
.air-item.center {
    grid-column: 1 / span 2;
}

/* logo */
.logo-box {
    width: 100%;
    max-width: 250px;
    aspect-ratio: 1 / 1;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* text */
.air-name {
    font-size: 16px;
    font-weight: 500;
}

.air-country {
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>wander</h1>
<img id="slide">

<div class="bottom"></div>

<div id="air-section">

    <h2 class="air-title">air</h2>

    <div class="air-container">

        <!-- KHUNG 1 -->
        <div class="air-frame">

            <div class="air-group">

                <!-- Ô 1 -->
                <div class="air-item center">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Qatar_Airways/Qatar_Airways-Logo.wine.svg">
                    </div>
                    <div class="air-name">Qatar Airways</div>
                    <div class="air-country">Qatar</div>
                </div>

                <!-- Ô 2 -->
                <div class="air-item">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Singapore_Airlines/Singapore_Airlines-Logo.wine.svg">
                    </div>
                    <div class="air-name">Singapore Airlines</div>
                    <div class="air-country">Singapore</div>
                </div>

                <!-- Ô 3 -->
                <div class="air-item">
                    <div class="logo-box">
                        <img src="https://www.logo.wine/a/logo/Cathay_Pacific/Cathay_Pacific-Logo.wine.svg">
                    </div>
                    <div class="air-name">Cathay Pacific</div>
                    <div class="air-country">Hong Kong</div>
                </div>

            </div>

        </div>

        <!-- KHUNG 2 (để trống hoặc dùng sau) -->
        <div class="air-frame"></div>

    </div>

</div>

<div id="time-wrapper">
    <div class="time-box" id="date-box"></div>
    <div class="time-box" id="clock-box"></div>
</div>

<div id="rocket-btn">🚀</div>

<script>
let images = [], current = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function changeImage() {
    if (images.length > 0) {
        document.getElementById("slide").src = images[current];
        current = (current + 1) % images.length;
    }
}

fetch("images.json")
    .then(r => r.json())
    .then(data => {
        shuffle(data);
        images = data.slice(0, 10);
        changeImage();
        setInterval(changeImage, 5000);
    });

const rocketBtn = document.getElementById("rocket-btn");
rocketBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n) { return n.toString().padStart(2, '0'); }

function updateTime() {
    const now = new Date();
    let year = now.getFullYear().toString();
    let yy1 = year.slice(0, 2), yy2 = year.slice(2);
    let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
    let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
    let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

    dateBox.innerHTML = `${yy1}<br>${yy2}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
    clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
}

setInterval(updateTime, 1000);
updateTime();
function getBrightness(r, g, b) {
    return (r * 299 + g * 587 + b * 114) / 1000;
}

function getBackgroundColorAtPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return [255,255,255];

    const style = getComputedStyle(el);
    const bg = style.backgroundColor;

    const match = bg.match(/\d+/g);
    if (match) return match.map(Number);

    return [255,255,255];
}

function updateTextColorByScroll() {
    const wrapper = document.getElementById("time-wrapper");
    const rect = wrapper.getBoundingClientRect();

    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    const [r,g,b] = getBackgroundColorAtPoint(x, y);
    const brightness = getBrightness(r,g,b);

    const color = brightness > 128 ? "#000" : "#fff";

    document.querySelectorAll(".time-box").forEach(el => {
        el.style.color = color;
    });
}

window.addEventListener("scroll", updateTextColorByScroll);
window.addEventListener("load", updateTextColorByScroll);
setInterval(updateTextColorByScroll, 500);
</script>

</body>
</html>
