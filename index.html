<!DOCTYPE html>
<html>
<head>
<title>wander</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    text-align:center;
    background:#fff;
}

h1 {
    font-family:'Satisfy',cursive;
    font-size:70px;
    font-weight:normal;
    margin:40px 0;
    color:#000;
}

img {
    width:100%;
    height:auto;
}

.bottom {
    height:120px;
}

/* --- NÚT ROCKET --- */
#control-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 9999;
}

.control-btn {
    font-size:32px;
    cursor:pointer;
    user-select:none;
}
</style>
</head>
<body>

<h1>wander</h1>
<img id="slide">

<div class="bottom"></div>

<!-- CHỈ GIỮ ROCKET -->
<div id="control-panel">
    <div class="control-btn" id="rocket-btn">🚀</div>
</div>

<script>
// =========================
// SLIDESHOW ẢNH
// =========================
let images=[], current=0;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function changeImage(){
    if(images.length>0){
        document.getElementById("slide").src = images[current];
        current=(current+1)%images.length;
    }
}

fetch("images.json")
.then(r=>r.json())
.then(data=>{
    shuffle(data);
    images=data.slice(0,10);
    changeImage();
    setInterval(changeImage,5000);
});

// =========================
// ROCKET SCROLL
// =========================
const rocketBtn=document.getElementById("rocket-btn");

rocketBtn.addEventListener("click",()=>{
    window.scrollTo({top:0,behavior:'smooth'});
});
</script>

</body>
</html>
