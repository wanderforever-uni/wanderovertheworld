<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>WANDER</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
}

/* vùng chữ */

.header{
width:100%;
height:15vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

.title{
font-size:70px;
font-family:'Pacifico', cursive;
color:#222;
}

/* slideshow */

.slideshow{
position:relative;
width:100%;
height:85vh;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2s;
}

.slide.active{
opacity:1;
}

</style>
</head>

<body>

<div class="header">
<div class="title">Wander</div>
</div>

<div class="slideshow">

<img class="slide active" src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1174&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1745781230148-cd467af9ac58?q=80&w=1471&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1620065487644-1080510335f5?q=80&w=1332&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1621584728858-616080e4bd01?q=80&w=1470&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1703825864792-5880081beaaf?q=80&w=1074&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=1492&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1590850093323-ccc35c610511?q=80&w=1074&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1610312278520-bcc893a3ff1d?q=80&w=1447&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1570742544137-3a469196c32b?q=80&w=1469&auto=format&fit=crop">
<img class="slide" src="https://images.unsplash.com/photo-1712901394300-2511501c4a8a?q=80&w=627&auto=format&fit=crop">

</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(function(){

slides[index].classList.remove("active");

index=(index+1)%slides.length;

slides[index].classList.add("active");

},5000);

</script>

</body>
</html>
