<!DOCTYPE html>
<html>
<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

<style>
body {
    margin:0;
    text-align:center;
    background:#fff;
}

h1 {
    font-family:'Satisfy',cursive;
    font-size:70px;
    font-weight:normal;
    margin:40px 0;
    color:#000;
}

img {
    width:100%;
    height:auto;
    display: block; 
}

.bottom {
    height:120px;
}

/* --- CONTROL PANEL --- */
#control-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 9999;
    /* Không đặt mix-blend-mode ở đây để cứu tên lửa */
}

/* 2 KHUNG NẰM NGANG */
#time-wrapper {
    display: flex;
    gap: 10px;
    /* CHÌA KHÓA: Phải có mix-blend-mode ở đây */
    mix-blend-mode: difference;
    /* Thêm dòng này để ép trình duyệt nhận diện lớp nền phía sau ảnh */
    position: relative; 
}

/* TIME BOX */
.time-box {
    font-family: 'Digital-7', monospace;
    text-align: center;
    line-height: 1.1;
    font-size: 18px;
    /* BẮT BUỘC là màu trắng (#fff) để hiệu ứng tương phản hoạt động */
    color: #ffffff; 
}

/* WEEKDAY XOAY */
.weekday {
    transform: rotate(90deg);
    display: inline-block;
    margin-top: 5px;
}

/* ROCKET */
.control-btn {
    font-size:32px;
    cursor:pointer;
    user-select:none;
    /* Xóa color: #fff ở đây để 🚀 hiện màu cam/đỏ gốc */
}
</style>
</head>

<body>

<h1>wander</h1>
<img id="slide">

<div class="bottom"></div>

<div id="control-panel">
    <div id="time-wrapper">
        <div class="time-box" id="date-box"></div>
        <div class="time-box" id="clock-box"></div>
    </div>

    <div class="control-btn" id="rocket-btn">🚀</div>
</div>

<script>
// Giữ nguyên toàn bộ JavaScript như bản gốc của bạn
let images=[], current=0;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function changeImage(){
  if(images.length>0){
      document.getElementById("slide").src = images[current];
      current=(current+1)%images.length;
    }
}

fetch("images.json")
.then(r=>r.json())
.then(data=>{
    shuffle(data);
    images=data.slice(0,10);
    changeImage();
    setInterval(changeImage,5000);
});

const rocketBtn=document.getElementById("rocket-btn");
rocketBtn.addEventListener("click",()=>{
    window.scrollTo({top:0,behavior:'smooth'});
});

const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n){ return n.toString().padStart(2,'0'); }

function updateTime(){
    const now = new Date();
    let year = now.getFullYear().toString();
    let yy1 = year.slice(0,2), yy2 = year.slice(2);
    let mm = pad(now.getMonth()+1), dd = pad(now.getDate());
    let weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][now.getDay()];
    let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

    dateBox.innerHTML = `${yy1}<br>${yy2}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
    clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
