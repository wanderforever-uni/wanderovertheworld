<!DOCTYPE html>
<html>

<head>

<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
}

h1{
font-family:'Satisfy',cursive;
font-size:70px;
font-weight:normal;
margin-top:40px;
margin-bottom:40px;
}

img{
width:100%;
height:auto;
}

.bottom{
height:120px;
}

</style>

</head>

<body>

<h1>wander</h1>

<img id="slide">

<!-- youtube player ẩn -->
<div id="player" style="display:none;"></div>

<div class="bottom"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   SLIDESHOW ẢNH
========================= */

let images = [];
let current = 0;

/* random thứ tự */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

/* đổi ảnh */
function changeImage(){

document.getElementById("slide").src = images[current];

current = (current + 1) % images.length;

}

/* đọc file images.json */

fetch("images.json")
.then(response=>response.json())
.then(data=>{

shuffle(data);

images = data.slice(0,10);

changeImage();

setInterval(changeImage,5000);

});


/* =========================
   NHẠC NỀN YOUTUBE
========================= */

let musicList = [];
let currentTrack = 0;
let player;

/* lấy video ID */

function getVideoId(url){
let match = url.match(/v=([^&]+)/);
return match ? match[1] : null;
}

/* youtube api ready */

function onYouTubeIframeAPIReady(){

fetch("music.json")
.then(res=>res.json())
.then(data=>{

shuffle(data);

musicList = data;

let firstId = getVideoId(musicList[0]);

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:firstId,
events:{
'onReady':startMusic,
'onStateChange':onPlayerStateChange
}
});

});

}

/* bắt đầu phát */

function startMusic(){
player.playVideo();
}

/* khi nhạc kết thúc */

function onPlayerStateChange(event){

if(event.data === YT.PlayerState.ENDED){

setTimeout(()=>{

currentTrack = (currentTrack+1)%musicList.length;

let nextId = getVideoId(musicList[currentTrack]);

player.loadVideoById(nextId);

},10000);

}

}

/* fix autoplay */

document.body.addEventListener("click",()=>{
if(player){
player.playVideo();
}
},{once:true});

</script>

<!-- =========================
   BỘ NÚT CUỘN MÀN HÌNH
========================= -->
<style>
#floatingControls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  gap: 10px;
  z-index: 9999;
}

.floatingBtn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 24px;
  transition: transform 0.2s;
}

.floatingBtn:hover {
  transform: scale(1.2);
}

/* Volume slider */
#volumeSlider {
  width: 100px;
  transform: rotate(-90deg);
  margin-bottom: 10px;
  display: none;
}

/* Digital clock styles */
.digitalBox {
  font-family: 'Digital-7', monospace;
  background: transparent;
  border: none;
  color: white;
  text-align: center;
  font-size: 20px;
  line-height: 1.2;
}

#dateBox span {
  display: block;
  transform: rotate(-90deg);
}
</style>

<!-- Volume slider -->
<input type="range" id="volumeSlider" min="0" max="100" value="50">

<div id="floatingControls">
  <div class="floatingBtn" id="rocketBtn">🚀</div>
  <div class="floatingBtn" id="pauseBtn">☁️</div>
  <div class="floatingBtn" id="volumeBtn">☁️</div>
</div>

<!-- Digital clocks -->
<div style="position: fixed; bottom: 20px; right: 90px; text-align:center; z-index:9999;">
  <input id="timeBox" class="digitalBox" readonly>
  <div id="dateBox" class="digitalBox"></div>
</div>

<script>
// ========= NÚT ROCKET ============
// Quay về đầu trang
document.getElementById("rocketBtn").addEventListener("click", () => {
  window.scrollTo({top:0, behavior:'smooth'});
});

// ========= NÚT PAUSE/PLAY NHẠC ============
let isPaused = false;
document.getElementById("pauseBtn").addEventListener("click", () => {
  if(!player) return;
  if(isPaused){
    player.playVideo();
    isPaused = false;
  } else {
    player.pauseVideo();
    isPaused = true;
  }
});

// ========= NÚT HIỆN VOLUME ============
const volumeBtn = document.getElementById("volumeBtn");
const volumeSlider = document.getElementById("volumeSlider");

volumeBtn.addEventListener("click", () => {
  if(volumeSlider.style.display === "none"){
    volumeSlider.style.display = "block";
  } else {
    volumeSlider.style.display = "none";
  }
});

// ========= SLIDER ĐIỀU CHỈNH VOLUME ============
volumeSlider.addEventListener("input", () => {
  if(player) {
    player.setVolume(volumeSlider.value);
  }
});

// ========= DIGITAL CLOCK ============
const timeBox = document.getElementById("timeBox");
const dateBox = document.getElementById("dateBox");

function updateClock(){
  const now = new Date();
  // Time
  let hh = String(now.getHours()).padStart(2,'0');
  let mm = String(now.getMinutes()).padStart(2,'0');
  let ss = String(now.getSeconds()).padStart(2,'0');
  timeBox.value = `${hh}\n${mm}\n${ss}`;

  // Date
  let yy1 = String(now.getFullYear()).slice(0,2);
  let yy2 = String(now.getFullYear()).slice(2,4);
  let month = String(now.getMonth()+1).padStart(2,'0');
  let day = String(now.getDate()).padStart(2,'0');
  let weekday = now.toLocaleDateString('en-US', {weekday:'long'}).toUpperCase();

  dateBox.innerHTML = `<span>${yy1}</span><span>${yy2}</span><span>${month}</span><span>${day}</span><span>${weekday}</span>`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>

</html>
