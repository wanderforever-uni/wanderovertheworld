<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>

    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

    <style>
        /* --- 1. GENERAL STYLES --- */
        @font-face {
            font-family: 'Modelista';
            src: url('font/Modelistasignature-ownAV.otf') format('opentype');
            font-display: swap;
        }

        body {
            margin: 0;
            text-align: center;
            background: #fff;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            /* 70px trên màn hình 3840px tương đương khoảng 1.82vw */
            /* Công thức: (70 / 3840) * 100 = 1.8229 */
            font-size: 3.64vw; 
    
            font-weight: normal;
    
            /* Margin 40px tương đương khoảng 1.04vw */
            margin: 1.04vw 0; 
    
            color: #000;
            text-align: center;
            width: 100%;
            display: block;
        }

        img {
            width: 100%;
            height: auto;       
            aspect-ratio: 16 / 9;  
            object-fit: cover;  
            display: block;

            image-rendering: -webkit-optimize-contrast; /* Hỗ trợ trình duyệt Chrome/Safari */
            image-rendering: high-quality;
        }

        .bottom {
            height: 0.78vw; /* ~30px/3840px */
        }

        /* --- 2. UI ELEMENTS (Clock & Rocket) --- */
        #time-wrapper {
            position: fixed;
            right: 20px;
            bottom: 120px;
            display: flex;
            gap: 10px;
            z-index: 9999;
            mix-blend-mode: exclusion;
            pointer-events: none;
        }

        .time-box {
            font-family: 'Digital-7', monospace;
            text-align: center;
            line-height: 1.1;
            font-size: 18px;
            color: #fff;
            filter: contrast(1000%) grayscale(100%);
        }

        .weekday {
            transform: rotate(90deg);
            display: inline-block;
            margin-top: 5px;
        }

        #rocket-btn {
            position: fixed;
            right: 32px;
            bottom: 20px;
            font-size: 32px;
            cursor: pointer;
            user-select: none;
            z-index: 10000;
        }

        /* --- 3. AIR SECTION --- */
        #air-section {
            position: relative;
            margin-left: 50px;
            margin-right: 40px;
            margin-top: 10px;
            margin-bottom: 60px;
            padding: 10px;
        }

        .air-title {
            font-family: 'Satisfy', cursive;
            font-size: 50px;
            text-align: center;
            margin-bottom: 30px;
            color: #000;
        }

        .air-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .air-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .air-item { text-align: center; }
        .air-item.center { grid-column: 1 / span 2; }

        .logo-box {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .air-name { font-size: 16px; font-weight: 500; line-height: 1.2; height: 2.4em; overflow: hidden; }
        .air-country { font-size: 14px; opacity: 0.7; line-height: 1.2; height: 2.4em; overflow: hidden; }

        /* Video */
        #video-container {
            width: 100%;
            max-width: 720px;
            aspect-ratio: 9 / 16;
            margin: 0 auto;
            position: relative;
        }

        #air-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Running Logos (Khung 3) */
        #air-extra { width: 100%; margin-top: 30px; }
        .logo-row {
            width: 100%;
            height: 140px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }

        .logo-track {
            display: flex;
            position: absolute;
            flex-wrap: nowrap;
            gap: 15px;
        }

        .logo-item { width: 100px; height: 100px; text-align: center; flex-shrink: 0; }
        .logo-item img { width: 100%; height: 100%; object-fit: contain; }
        .logo-name { font-size: 12px; }
        .logo-country { font-size: 11px; opacity: 0.7; }

        @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes scroll-right { from { transform: translateX(-50%); } to { transform: translateX(0); } }

        /* --- 4. PASSPORT SECTION --- */
        #passport-section {
            max-width: calc(100% - 80px);
            margin: 50px auto 10px;
            padding: 10px;
        }

        .passport-title {
            font-family: 'Satisfy', cursive;
            font-size: 50px;
            text-align: center;
            margin-bottom: 60px;
            color: #000;
        }

        .passport-frame {
            display: flex;
            gap: 20px;
            width: calc(100% - 80px);
            margin: 0 auto;
        }

        .passport-col-left {
            width: auto;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .passport-top { width: 520px; height: 738.5px; overflow: hidden; }
        .passport-top img { width: 100%; height: 100%; object-fit: contain; }

        .passport-bottom {
            width: 520px;
            min-height: 100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row-1 { text-align: center; font-size: 18px; font-weight: 600; }
        .row-2 { text-align: center; font-size: 16px; }
        .row-3 { display: flex; justify-content: space-between; font-size: 14px; }

        .passport-col-right { flex: 1; }
        #passport-grid { display: flex; flex-direction: column; gap: 50px; }
        .passport-row { display: flex; justify-content: space-between; }

        .passport-item {
            width: calc(1477px / 8);
            aspect-ratio: 1 / 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .img-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .img-box img { height: 100%; max-width: 100%; object-fit: contain; }
        .p-name { font-size: 12px; font-weight: 600; line-height: 1.2; height: 2.4em; overflow: hidden; }

        .passport-row-lower {
            display: flex;
            gap: 50px;
            width: 100%;
            transform: translateY(60px);
            justify-content: center;
        }

        .lower-frame {
            flex: 1;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .lower-img { width: 100px; height: 100px; }
        .lower-img img { width: 100%; height: 100%; object-fit: contain; }
        .lower-search { width: 100%; position: relative; display: flex; gap: 5px; }
        .search-input { flex: 1; padding: 4px 6px; font-size: 12px; }
        .search-suggestions {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #fff; border: 1px solid #ccc; max-height: 100px;
            overflow-y: auto; display: none; z-index: 999; font-size: 12px;
        }
        .search-suggestions div { padding: 4px 6px; cursor: pointer; }
        .search-suggestions div:hover { background-color: #eee; }

        .passport-total {
            margin-top: 120px;
            font-family: 'Modelista', cursive;
            font-size: 200px;
            text-align: center;
            color: #A7C7E7;
        }
    </style>
</head>

<body>

    <h1>wander</h1>
    <img id="slide">
    <div class="bottom"></div>

    <div id="air-section">
        <h2 class="air-title">air</h2>
        <div class="air-container">
            <div class="air-frame">
                <div class="air-group">
                    <div class="air-item center">
                        <div class="logo-box"><img src="https://www.logo.wine/a/logo/Qatar_Airways/Qatar_Airways-Logo.wine.svg"></div>
                        <div class="air-name">Qatar Airways</div>
                        <div class="air-country">Qatar</div>
                    </div>
                    <div class="air-item">
                        <div class="logo-box"><img src="https://www.logo.wine/a/logo/Singapore_Airlines/Singapore_Airlines-Logo.wine.svg"></div>
                        <div class="air-name">Singapore Airlines</div>
                        <div class="air-country">Singapore</div>
                    </div>
                    <div class="air-item">
                        <div class="logo-box"><img src="https://www.logo.wine/a/logo/Cathay_Pacific/Cathay_Pacific-Logo.wine.svg"></div>
                        <div class="air-name">Cathay Pacific</div>
                        <div class="air-country">Hong Kong</div>
                    </div>
                </div>
                <div id="air-extra">
                    <div class="logo-row" id="row-top"></div>
                    <div class="logo-row" id="row-bottom"></div>
                </div>
            </div>

            <div class="air-frame">
                <div id="video-container">
                    <video id="air-video" autoplay muted playsinline></video>
                    <div id="video-controls" style="display:flex; justify-content:center; gap:30px; margin-top:10px;">
                        <span id="mute-btn" style="cursor:pointer; font-size:32px;">⭐</span>
                        <span id="play-btn" style="cursor:pointer; font-size:32px;">⭐</span>
                        <span id="volume-btn" style="cursor:pointer; font-size:32px;">⭐</span>
                    </div>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" style="display:none; width:200px; margin:10px auto;">
                </div>
            </div>
        </div>
    </div>

    <div id="passport-section">
        <h2 class="passport-title">passport</h2>
        <div class="passport-content">
            <div class="passport-frame">
                <div class="passport-col-left">
                    <div class="passport-top">
                        <img src="https://cdn.henleyglobal.com/themes/hgo/public/assets/img/passports/SG.png" alt="Singapore Passport">
                    </div>
                    <div class="passport-bottom">
                        <div class="row row-1">Singapore</div>
                        <div class="row row-2" id="rank-value">1st</div>
                        <div class="row row-3">
                            <div class="left">VISA-FREE DESTINATIONS</div>
                            <div class="right">195</div>
                        </div>
                    </div>
                </div>

                <div class="passport-col-right">
                    <div id="passport-grid">
                        <div class="passport-row" id="row-1"></div>
                        <div class="passport-row" id="row-2"></div>
                        <div class="passport-row-lower">
                            <div class="lower-frame">
                                <div class="lower-img"><img src="https://cdn-icons-png.flaticon.com/512/7893/7893979.png"></div>
                                <div class="lower-name"><strong>wait</strong></div>
                                <div class="lower-rank">wait</div>
                                <div class="lower-visa">wait</div>
                                <div class="lower-search">
                                    <input type="text" placeholder="Search country..." class="search-input">
                                    <div class="search-suggestions"></div>
                                </div>
                            </div>
                            <div class="lower-frame">
                                <div class="lower-img"><img src="https://cdn-icons-png.flaticon.com/512/7893/7893979.png"></div>
                                <div class="lower-name"><strong>wait</strong></div>
                                <div class="lower-rank">wait</div>
                                <div class="lower-visa">wait</div>
                                <div class="lower-search">
                                    <input type="text" placeholder="Search country..." class="search-input">
                                    <div class="search-suggestions"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="passport-total">199</div>
                </div>
            </div>
        </div>
    </div>

    <div id="time-wrapper">
        <div class="time-box" id="date-box"></div>
        <div class="time-box" id="clock-box"></div>
    </div>
    <div id="rocket-btn">🚀</div>

    <script>
        /* --- UTILS --- */
        function shuffleArray(arr) {
            let copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function pad(n) { return n.toString().padStart(2, '0'); }

        /* --- 1. SLIDESHOW --- */
        let images = [], currentImg = 0;
        fetch("images.json").then(r => r.json()).then(data => {
            images = shuffleArray(data).slice(0, 10);
            const slideImg = document.getElementById("slide");
            const changeImage = () => {
                if (images.length > 0) {
                    slideImg.src = images[currentImg];
                    currentImg = (currentImg + 1) % images.length;
                }
            };
            changeImage();
            setInterval(changeImage, 5000);
        });

        /* --- 2. CLOCK & UI TOGGLE --- */
        const dateBox = document.getElementById("date-box");
        const clockBox = document.getElementById("clock-box");
        const rocket = document.getElementById("rocket-btn");
        const timeWrapper = document.getElementById("time-wrapper");

        function updateTime() {
            const now = new Date();
            let year = now.getFullYear().toString();
            let mm = pad(now.getMonth() + 1), dd = pad(now.getDate());
            let weekday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][now.getDay()];
            let hh = pad(now.getHours()), min = pad(now.getMinutes()), ss = pad(now.getSeconds());

            dateBox.innerHTML = `${year.slice(0,2)}<br>${year.slice(2)}<br>${mm}<br>${dd}<br><span class="weekday">${weekday}</span>`;
            clockBox.innerHTML = `${hh}<br>${min}<br>${ss}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        window.addEventListener("scroll", () => {
            const triggerHeight = document.getElementById("slide").offsetHeight;
            const opacity = window.scrollY < triggerHeight ? "0" : "1";
            rocket.style.opacity = opacity;
            timeWrapper.style.opacity = opacity;
        });

        rocket.addEventListener("click", () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        /* --- 3. AIR VIDEO --- */
        const videoEl = document.getElementById("air-video");
        let originalVideos = [], videoList = [], currentVideoIndex = 0;

        fetch("planevideo.json").then(r => r.json()).then(data => {
            originalVideos = data;
            videoList = shuffleArray(originalVideos);
            playNextVideo();
        });

        function playNextVideo() {
            if (videoList.length === 0) return;
            videoEl.src = videoList[currentVideoIndex];
            videoEl.play().catch(()=>{});
            currentVideoIndex++;
            if (currentVideoIndex >= videoList.length) {
                videoList = shuffleArray(originalVideos).slice(0, 10);
                currentVideoIndex = 0;
            }
        }
        videoEl.addEventListener("ended", playNextVideo);

        // Controls
        document.getElementById("mute-btn").addEventListener("click", function() {
            videoEl.muted = !videoEl.muted;
            this.textContent = videoEl.muted ? "⭐" : "🌟";
        });
        document.getElementById("play-btn").addEventListener("click", function() {
            if (videoEl.paused) { videoEl.play(); this.textContent = "⭐"; }
            else { videoEl.pause(); this.textContent = "🌟"; }
        });
        document.getElementById("volume-btn").addEventListener("click", () => {
            const slider = document.getElementById("volume-slider");
            slider.style.display = (slider.style.display === "none") ? "block" : "none";
        });
        document.getElementById("volume-slider").addEventListener("input", (e) => videoEl.volume = e.target.value);

        /* --- 4. AIRLINE LOGO MARQUEE --- */
        let airlineData = [];
        fetch("airline.json").then(r => r.json()).then(data => {
            airlineData = data;
            const top = document.getElementById("row-top");
            const bottom = document.getElementById("row-bottom");
            
            const build = (el, list, dir) => {
                el.innerHTML = "";
                const track = document.createElement("div");
                track.className = "logo-track";
                [...list, ...list].forEach(air => {
                    const item = document.createElement("div");
                    item.className = "logo-item";
                    item.innerHTML = `<img src="${air.logo}" onerror="this.src='https://via.placeholder.com/100'">
                                      <div class="logo-name">${air.name}</div>
                                      <div class="logo-country">${air.country}</div>`;
                    track.appendChild(item);
                });
                el.appendChild(track);
                track.style.animation = `${dir === "left" ? "scroll-left" : "scroll-right"} 250s linear infinite`;
            };

            build(top, shuffleArray(airlineData), "right");
            build(bottom, shuffleArray(airlineData), "left");
        });

        /* --- 5. PASSPORT LOGIC --- */
        let passports = [], passportInfo = {}, cycles = [], currentRound = 0;

        Promise.all([
            fetch("passport.json").then(r => r.json()),
            fetch("passportData.json").then(r => r.json())
        ]).then(([pData, pDetails]) => {
            passports = pData;
            passportInfo = pDetails;
            
            const generate = () => {
                let shuffled = shuffleArray(passports);
                cycles = [];
                for (let i = 0; i < Math.ceil(passports.length / 10); i++) {
                    let slice = shuffled.slice(i * 10, (i + 1) * 10);
                    while(slice.length < 10) slice.push(passports[Math.floor(Math.random()*passports.length)]);
                    cycles.push(slice);
                }
            };

            const render = () => {
                const r1 = document.getElementById("row-1"), r2 = document.getElementById("row-2");
                r1.innerHTML = ""; r2.innerHTML = "";
                cycles[currentRound].forEach((p, i) => {
                    const info = passportInfo[p.name] || {};
                    const div = document.createElement("div");
                    div.className = "passport-item";
                    div.innerHTML = `<div class="img-box"><img src="${p.image}"></div>
                                     <div class="p-name">${p.name}</div>
                                     <div class="p-rank">${info.rank ? getOrdinal(info.rank) : "..."}</div>
                                     <div class="p-visa">${info.visa || "..."}</div>`;
                    if (i < 5) r1.appendChild(div); else r2.appendChild(div);
                });
            };

            generate(); render();
            setInterval(() => {
                currentRound = (currentRound + 1) % cycles.length;
                if(currentRound === 0) generate();
                render();
            }, 20000);

            // Search Logic
            document.querySelectorAll(".lower-frame").forEach(frame => {
                const input = frame.querySelector(".search-input");
                const sugg = frame.querySelector(".search-suggestions");
                input.addEventListener("input", () => {
                    const val = input.value.toLowerCase();
                    const matches = passports.filter(p => p.name.toLowerCase().includes(val));
                    sugg.innerHTML = "";
                    if (val && matches.length) {
                        matches.forEach(m => {
                            const d = document.createElement("div");
                            d.textContent = m.name;
                            d.onclick = () => {
                                input.value = m.name;
                                sugg.style.display = "none";
                                const info = passportInfo[m.name];
                                frame.querySelector(".lower-img img").src = m.image;
                                frame.querySelector(".lower-name").textContent = m.name;
                                frame.querySelector(".lower-rank").textContent = info ? getOrdinal(info.rank) : "wait";
                                frame.querySelector(".lower-visa").textContent = info ? info.visa : "wait";
                            };
                            sugg.appendChild(d);
                        });
                        sugg.style.display = "block";
                    } else sugg.style.display = "none";
                });
            });
        });
    </script>
</body>
</html>
