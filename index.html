<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wander</title>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; text-align:center; background:#fff; font-family:sans-serif; }
        h1 { font-family:'Satisfy', cursive; font-size:70px; margin:40px 0; }
        img { width:100%; height:auto; display:block; }
        
        /* Panel Settings */
        #controlPanel { position:fixed; right:30px; bottom:40px; display:flex; flex-direction:column-reverse; align-items:center; gap:15px; z-index:9999; }
        .btn { font-size:32px; cursor:pointer; transition:0.3s; user-select:none; }
        .sub-menu { display:none; flex-direction:column; gap:10px; font-size:24px; }
        #volumeSlider { writing-mode: bt-lr; appearance: slider-vertical; width:8px; height:80px; display:none; }

        #casioPanel { position:fixed; left:30px; top:50%; transform:translateY(-50%); display:flex; gap:20px; font-family:'Share Tech Mono', monospace; z-index:9999; }
        .clock-box { display:flex; flex-direction:column; line-height:1.1; font-size:28px; }
        .day-vertical { font-size:14px; writing-mode:vertical-rl; margin-top:5px; }
        #player { position: absolute; top: -9999px; }
    </style>
</head>
<body>

    <h1>wander</h1>
    <img id="slide">
    <div id="player"></div>

    <div id="casioPanel">
        <div class="clock-box">
            <span id="hh">00</span><span id="mm">00</span><span id="ss" style="font-size:18px; opacity:0.6;">00</span>
        </div>
        <div class="clock-box">
            <span id="y1">20</span><span id="y2">26</span><span id="month">01</span><span id="day">01</span>
            <div id="weekday" class="day-vertical">MONDAY</div>
        </div>
    </div>

    <div id="controlPanel">
        <div class="btn" id="rocketBtn">🚀</div>
        <div class="btn" id="playPauseBtn">☁️</div>
        <div class="btn" id="navBtn">
            <div class="sub-menu" id="navSub"><span id="prevBtn">⭐</span><span id="nextBtn">⭐</span></div>
            ☁️
        </div>
        <div class="btn" id="volBtn">
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
            ☁️
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let musicList = [], currentTrack = 0, player, playerReady = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function getVideoId(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 1. Khởi tạo Player
        function onYouTubeIframeAPIReady() {
            fetch("music.json")
            .then(res => res.json())
            .then(data => {
                shuffle(data);
                musicList = data;
                player = new YT.Player('player', {
                    height: '0', width: '0',
                    videoId: getVideoId(musicList[0]),
                    playerVars: { 'autoplay': 1, 'mute': 1, 'enablejsapi': 1 },
                    events: {
                        'onReady': (e) => { 
                            playerReady = true; 
                            e.target.playVideo(); // Chạy ngầm ngay khi sẵn sàng
                            console.log("YouTube Ready");
                        },
                        'onStateChange': (e) => {
                            if(e.data === YT.PlayerState.ENDED) nextTrack();
                        }
                    }
                });
            }).catch(e => console.error("Lỗi fetch nhạc:", e));
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % musicList.length;
            player.loadVideoById(getVideoId(musicList[currentTrack]));
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + musicList.length) % musicList.length;
            player.loadVideoById(getVideoId(musicList[currentTrack]));
        }

        // 2. Xử lý CLICK TO PLAY (Khắc phục lỗi reset trang)
        document.addEventListener("click", function initAudio() {
            if (playerReady && player) {
                player.unMute();
                player.setVolume(50);
                player.playVideo();
                console.log("Audio Activated");
                // Sau khi kích hoạt thành công, gỡ bỏ sự kiện này để không bị reset volume mỗi lần click
                document.removeEventListener("click", initAudio);
            }
        });

        // 3. Các nút điều khiển
        document.getElementById("rocketBtn").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        
        document.getElementById("playPauseBtn").onclick = (e) => {
            e.stopPropagation();
            if(!playerReady) return;
            player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
        };

        document.getElementById("navBtn").onclick = (e) => {
            e.stopPropagation();
            const s = document.getElementById("navSub");
            s.style.display = s.style.display === "flex" ? "none" : "flex";
        };

        document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); nextTrack(); };
        document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); prevTrack(); };

        document.getElementById("volBtn").onclick = (e) => {
            e.stopPropagation();
            const v = document.getElementById("volumeSlider");
            v.style.display = v.style.display === "block" ? "none" : "block";
        };

        document.getElementById("volumeSlider").oninput = function(e) {
            if(playerReady) player.setVolume(this.value);
        };

        // 4. Clock Logic
        function updateClock() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            document.getElementById("hh").innerText = pad(now.getHours());
            document.getElementById("mm").innerText = pad(now.getMinutes());
            document.getElementById("ss").innerText = pad(now.getSeconds());
            const y = String(now.getFullYear());
            document.getElementById("y1").innerText = y.slice(0,2);
            document.getElementById("y2").innerText = y.slice(2);
            document.getElementById("month").innerText = pad(now.getMonth()+1);
            document.getElementById("day").innerText = pad(now.getDate());
            const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
            document.getElementById("weekday").innerText = days[now.getDay()];
        }
        setInterval(updateClock, 1000); updateClock();

        // 5. Slideshow
        fetch("images.json").then(r=>r.json()).then(d=>{
            let i=0; document.getElementById("slide").src=d[0];
            setInterval(()=>{ i=(i+1)%d.length; document.getElementById("slide").src=d[i]; }, 5000);
        });
    </script>
</body>
</html>
