<!DOCTYPE html>
<html>
<head>
<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7" rel="stylesheet">

<style>
body {
    margin:0;
    text-align:center;
    background:#000;
}

/* BACKGROUND IMAGE */
#bg {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: -1;
}

h1 {
    font-family:'Satisfy',cursive;
    font-size:70px;
    font-weight:normal;
    margin:40px 0;
    color:#fff;
    mix-blend-mode: difference;
}

.bottom {
    height:120px;
}

/* CONTROL PANEL */
#control-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* TIME */
#time-wrapper {
    display: flex;
    gap: 10px;
}

.time-box {
    font-family: 'Digital-7', monospace;
    font-size: 18px;
    line-height: 1.1;
    text-align: center;

    color: white;
    mix-blend-mode: difference; /* 🔥 REAL CONTRAST */
}

/* WEEKDAY XOAY */
.weekday {
    display: inline-block;
    transform: rotate(90deg);
    margin-top: 5px;
}

/* ROCKET */
.control-btn {
    font-size:32px;
    cursor:pointer;
    user-select:none;
    color:white;
    mix-blend-mode: difference;
}
</style>
</head>

<body>

<div id="bg"></div>

<h1>wander</h1>

<div class="bottom"></div>

<div id="control-panel">

    <!-- TIME -->
    <div id="time-wrapper">
        <div class="time-box" id="date-box"></div>
        <div class="time-box" id="clock-box"></div>
    </div>

    <!-- ROCKET -->
    <div class="control-btn" id="rocket-btn">🚀</div>
</div>

<script>
// =========================
// SLIDESHOW (BACKGROUND)
// =========================
let images=[], current=0;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function changeImage(){
    if(images.length>0){
        const bg = document.getElementById("bg");
        bg.style.backgroundImage = `url(${images[current]})`;

        current=(current+1)%images.length;
    }
}

fetch("images.json")
.then(r=>r.json())
.then(data=>{
    shuffle(data);
    images=data.slice(0,10);
    changeImage();
    setInterval(changeImage,5000);
});

// =========================
// ROCKET
// =========================
document.getElementById("rocket-btn")
.addEventListener("click",()=>{
    window.scrollTo({top:0,behavior:'smooth'});
});

// =========================
// TIME
// =========================
const dateBox = document.getElementById("date-box");
const clockBox = document.getElementById("clock-box");

function pad(n){
    return n.toString().padStart(2,'0');
}

function updateTime(){
    const now = new Date();

    let year = now.getFullYear().toString();

    let yy1 = year.slice(0,2);
    let yy2 = year.slice(2);

    let mm = pad(now.getMonth()+1);
    let dd = pad(now.getDate());

    let weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][now.getDay()];

    let hh = pad(now.getHours());
    let min = pad(now.getMinutes());
    let ss = pad(now.getSeconds());

    dateBox.innerHTML = `
        ${yy1}<br>
        ${yy2}<br>
        ${mm}<br>
        ${dd}<br>
        <span class="weekday">${weekday}</span>
    `;

    clockBox.innerHTML = `
        ${hh}<br>
        ${min}<br>
        ${ss}
    `;
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
