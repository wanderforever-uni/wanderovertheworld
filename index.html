<!DOCTYPE html>
<html>

<head>

<title>wander</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>

body{
margin:0;
text-align:center;
}

h1{
font-family:'Dancing Script', cursive;
font-size:60px;
font-weight:normal;
margin-top:40px;
}

img{
width:100%;
}

.bottom{
height:120px;
}

</style>

</head>

<body>

<h1>wander</h1>

<img id="slide">

<div class="bottom"></div>

<script>

const images = [

"https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1174&auto=format&fit=crop",
"https://images.unsplash.com/photo-1745781230148-cd467af9ac58?q=80&w=1471&auto=format&fit=crop",
"https://images.unsplash.com/photo-1620065487644-1080510335f5?q=80&w=1332&auto=format&fit=crop",
"https://images.unsplash.com/photo-1621584728858-616080e4bd01?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1703825864792-5880081beaaf?q=80&w=1074&auto=format&fit=crop",
"https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=1492&auto=format&fit=crop",
"https://images.unsplash.com/photo-1590850093323-ccc35c610511?q=80&w=1074&auto=format&fit=crop",
"https://images.unsplash.com/photo-1610312278520-bcc893a3ff1d?q=80&w=1447&auto=format&fit=crop",
"https://images.unsplash.com/photo-1570742544137-3a469196c32b?q=80&w=1469&auto=format&fit=crop",
"https://images.unsplash.com/photo-1655722723123-c68bdb4f3ce0?q=80&w=1170&auto=format&fit=crop"

];

let current = 0;

function changeImage(){

document.getElementById("slide").src = images[current];

current = (current + 1) % images.length;

}

changeImage();

setInterval(changeImage,5000);

</script>

</body>

</html>
